<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Black Hole — GLSL Ray Marching</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #hint {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.18); font: 11px/1 monospace; pointer-events: none;
    }
    #controls {
      position: absolute; top: 12px; right: 12px; bottom: 12px;
      color: #ccc; font: 11px/2.2 monospace;
      background: rgba(0,4,12,0.78); padding: 10px 14px; border-radius: 4px;
      min-width: 260px; overflow-y: auto; border: 1px solid #1a2535;
    }
    #controls::-webkit-scrollbar { width: 3px; }
    #controls::-webkit-scrollbar-thumb { background: rgba(80,120,180,0.3); border-radius: 2px; }
    #controls label { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    #controls input[type=range] { width: 100px; }
    #controls span { min-width: 42px; text-align: right; color: #fff; }
    #controls hr { border: none; border-top: 1px solid #1a2535; margin: 4px 0; }
    .ctl-btn {
      flex: 1; padding: 3px 0; border: 1px solid #1a2535; border-radius: 3px;
      background: rgba(20,50,100,0.2); color: #7799bb; font: 10px monospace;
      cursor: pointer;
    }
    .ctl-btn:hover { background: rgba(30,70,140,0.3); }
    #import-file { display: none; }
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,3,10,0.92); color: #7799cc; font: 11px monospace;
      padding: 7px 18px; border-radius: 20px; pointer-events: none;
      opacity: 0; transition: opacity 0.3s;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="hint">DRAG TO ORBIT &nbsp;·&nbsp; SCROLL TO ZOOM</div>
<div id="toast"></div>

<div id="controls">
  <b style="color:#aaddff">Black Hole</b>
  <hr>

  <b style="color:#cccccc">Geometry</b>
  <label>BH radius (Rs)     <input type="range" id="Rs"        min="0.1"  max="2"    step="0.05"  value="0.3">  <span id="RsV">0.30</span></label>
  <label>Disk inner         <input type="range" id="diskInn"   min="0.1"  max="4"    step="0.05"  value="0.75"> <span id="diskInnV">0.75</span></label>
  <label>Disk outer         <input type="range" id="diskOut"   min="0.5"  max="12"   step="0.1"   value="2.2">  <span id="diskOutV">2.20</span></label>
  <label>Disk thickness     <input type="range" id="diskThk"   min="0.01" max="1.5"  step="0.01"  value="0.05"> <span id="diskThkV">0.05</span></label>
  <hr>

  <b style="color:#ff9944">Disk Appearance</b>
  <label>Brightness         <input type="range" id="diskBri"   min="0.5"  max="20"   step="0.25"  value="4.5">  <span id="diskBriV">4.50</span></label>
  <label>Doppler strength   <input type="range" id="doppler"   min="0"    max="1"    step="0.01"  value="0">    <span id="dopplerV">0.00</span></label>
  <label>Rotation speed     <input type="range" id="rotSpd"    min="0"    max="3"    step="0.05"  value="0">    <span id="rotSpdV">0.00</span></label>
  <label>Streak density     <input type="range" id="streaks"   min="1"    max="30"   step="0.5"   value="30">   <span id="streaksV">30.0</span></label>
  <hr>

  <b style="color:#eeeeff">Photon Ring</b>
  <label>Brightness         <input type="range" id="psBright"  min="0"    max="20"   step="0.25"  value="2.5">  <span id="psBrightV">2.50</span></label>
  <label>Width              <input type="range" id="psWidth"   min="0.01" max="0.5"  step="0.01"  value="0.05"> <span id="psWidthV">0.05</span></label>
  <label>Fresnel (disk sep) <input type="range" id="psFresnel" min="0"    max="10"   step="0.1"   value="0">    <span id="psFresnelV">0.0</span></label>
  <hr>

  <b style="color:#88aaff">Lensing</b>
  <label>Integration steps  <input type="range" id="steps"     min="50"   max="500"  step="10"    value="500">  <span id="stepsV">500</span></label>
  <label>Step size          <input type="range" id="stepSz"    min="0.01" max="0.2"  step="0.005" value="0.1">  <span id="stepSzV">0.10</span></label>
  <hr>

  <b style="color:#88ccff">Global</b>
  <label>Exposure           <input type="range" id="expo"      min="0.1"  max="3"    step="0.05"  value="1">    <span id="expoV">1.00</span></label>
  <label>Auto-rotate        <input type="range" id="rotat"     min="0"    max="0.3"  step="0.01"  value="0.04"> <span id="rotatV">0.04</span></label>
  <hr>

  <div style="display:flex; gap:6px; padding:2px 0">
    <button class="ctl-btn" id="btn-export">⬇ Export JSON</button>
    <button class="ctl-btn" id="btn-import">⬆ Import JSON</button>
  </div>
  <input type="file" id="import-file" accept=".json">
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
renderer.setSize(innerWidth, innerHeight)
renderer.outputColorSpace = THREE.LinearSRGBColorSpace
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000)
camera.position.set(0, 0.6, 12)
camera.lookAt(0, 0, 0)

const orbitCtrl = new OrbitControls(camera, renderer.domElement)
orbitCtrl.enableDamping   = true
orbitCtrl.dampingFactor   = 0.05
orbitCtrl.enablePan       = false
orbitCtrl.minDistance     = 2
orbitCtrl.maxDistance     = 40
orbitCtrl.autoRotate      = true
orbitCtrl.autoRotateSpeed = 0.04

// ── Uniforms ──────────────────────────────────────────────────────────────────
const uniforms = {
  uResolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
  uCamPos:     { value: new THREE.Vector3() },
  uCamRight:   { value: new THREE.Vector3() },
  uCamUp:      { value: new THREE.Vector3() },
  uCamFwd:     { value: new THREE.Vector3() },
  uFov:        { value: Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)) },
  uTime:       { value: 0 },
  uRs:         { value: 0.3 },
  uDiskInn:    { value: 0.75 },
  uDiskOut:    { value: 2.2 },
  uDiskThk:    { value: 0.05 },
  uDiskBri:    { value: 4.5 },
  uDoppler:    { value: 0.0 },
  uRotSpd:     { value: 0.0 },
  uStreaks:     { value: 30.0 },
  uSteps:      { value: 500 },
  uStepSz:     { value: 0.1 },
  uExposure:   { value: 1.0 },
  uPSBright:   { value: 2.5 },
  uPSWidth:    { value: 0.05 },
  uPSFresnel:  { value: 0.0 },
}

// ── Vertex shader ─────────────────────────────────────────────────────────────
const vertexShader = /* glsl */`
  void main() {
    gl_Position = vec4(position, 1.0);
  }
`

// ── Fragment shader — Schwarzschild ray marching ───────────────────────────────
const fragmentShader = /* glsl */`
  precision highp float;

  uniform vec2  uResolution;
  uniform vec3  uCamPos;
  uniform vec3  uCamRight;
  uniform vec3  uCamUp;
  uniform vec3  uCamFwd;
  uniform float uFov;
  uniform float uTime;
  uniform float uRs;
  uniform float uDiskInn;
  uniform float uDiskOut;
  uniform float uDiskThk;
  uniform float uDiskBri;
  uniform float uDoppler;
  uniform float uRotSpd;
  uniform float uStreaks;
  uniform float uSteps;
  uniform float uStepSz;
  uniform float uExposure;
  uniform float uPSBright;    // photon ring brightness
  uniform float uPSWidth;     // photon ring width
  uniform float uPSFresnel;   // disk separation — higher = ring detaches from disk

  // ── Hash / noise ─────────────────────────────────────────────────────────────
  float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
  }
  float hash3(vec3 p) {
    return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453);
  }
  float noise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f*f*(3.0-2.0*f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
               mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
  }

  // ── Geodesic acceleration (Schwarzschild) ─────────────────────────────────────
  // For a null geodesic in Schwarzschild spacetime the spatial acceleration is:
  //   a = (M/r³)[ 2·vᵣ·v  −  (v²−3vᵣ²)·r̂ ]
  //
  // Sign check — tangential photon (vᵣ=0, v²=1):
  //   a = (M/r³)(0 − r̂) = −(M/r³)r̂  →  INWARD  ✓  (light bends toward BH)
  //
  // Previously the sign was flipped (+leading minus), causing rays to bend AWAY
  // from the BH — that is why the photon sphere was absent and the disk did not lift.
  vec3 geodesicAccel(vec3 pos, vec3 vel) {
    float M  = uRs * 0.5;
    float r  = max(length(pos), uRs * 0.52);
    float r3 = r * r * r;
    vec3  rh = pos / r;
    float vr = dot(vel, rh);
    float v2 = dot(vel, vel);
    return (M / r3) * (2.0 * vr * vel - (v2 - 3.0*vr*vr) * rh);
  }

  // ── RK4 integration step ──────────────────────────────────────────────────────
  void rk4(inout vec3 pos, inout vec3 vel, float h) {
    vec3 k1v = geodesicAccel(pos, vel);
    vec3 k1p = vel;
    vec3 k2v = geodesicAccel(pos+0.5*h*k1p, vel+0.5*h*k1v); vec3 k2p = vel+0.5*h*k1v;
    vec3 k3v = geodesicAccel(pos+0.5*h*k2p, vel+0.5*h*k2v); vec3 k3p = vel+0.5*h*k2v;
    vec3 k4v = geodesicAccel(pos+h*k3p,     vel+h*k3v);     vec3 k4p = vel+h*k3v;
    pos += (h/6.0)*(k1p+2.0*k2p+2.0*k3p+k4p);
    vel += (h/6.0)*(k1v+2.0*k2v+2.0*k3v+k4v);
    vel  = normalize(vel);   // stay on null geodesic
  }

  // ── Disk colour at a hit position ─────────────────────────────────────────────
  vec3 diskColor(vec3 hitPos, float hitCount) {
    float r     = length(hitPos.xz);
    float t     = clamp((r - uDiskInn) / (uDiskOut - uDiskInn), 0.0, 1.0);

    // Temperature gradient: white-hot → orange → dark red
    vec3 innerC = vec3(1.00, 0.90, 0.65);
    vec3 midC   = vec3(1.00, 0.38, 0.06);
    vec3 outerC = vec3(0.65, 0.05, 0.01);
    vec3 col    = t < 0.45
                    ? mix(innerC, midC,   t / 0.45)
                    : mix(midC,   outerC, (t-0.45)/0.55);

    // Radial brightness: intense inner edge, power-law falloff
    float bri   = pow(1.0 - t, 2.8) * uDiskBri + 0.15;

    // Relativistic Doppler: orbital speed ≈ sqrt(M/r) in natural units
    float M     = uRs * 0.5;
    float beta  = sqrt(clamp(M / r, 0.0, 0.9));
    float angle = atan(hitPos.z, hitPos.x) + uTime * uRotSpd;
    float dop   = (1.0 + uDoppler * beta * sin(angle))
                / sqrt(1.0 - beta * beta);  // relativistic Doppler factor
    bri        *= clamp(dop, 0.1, 5.0);

    // Turbulent plasma streaks
    float streak = 0.6 + 0.4 * sin(r * uStreaks - uTime * uRotSpd * 2.0 + angle * 0.8);
    float turb   = 0.75 + 0.25 * noise(vec2(r * 3.0 + uTime*0.08, angle * 2.5));
    bri         *= streak * turb;

    // Each successive lensed image is dimmer
    bri *= pow(0.35, hitCount);

    return col * bri;
  }

  // ── Star field background ─────────────────────────────────────────────────────
  vec3 starfield(vec3 dir) {
    dir = normalize(dir);
    vec3 col = vec3(0.0);
    // Dense faint stars
    vec3 s1 = dir * 130.0;
    float h1 = hash3(floor(s1));
    if (h1 > 0.972) {
      float s = pow(max(0.0, 1.0 - length(fract(s1)-0.5)*9.0), 2.0);
      col += s * 0.5 * mix(vec3(0.7,0.8,1.0), vec3(1.0,0.9,0.7), h1);
    }
    // Sparse bright stars
    vec3 s2 = dir * 55.0;
    float h2 = hash3(floor(s2) + 77.7);
    if (h2 > 0.989) {
      float s = pow(max(0.0, 1.0 - length(fract(s2)-0.5)*9.0), 2.0);
      col += s * 1.4 * mix(vec3(1.0,0.95,0.8), vec3(0.7,0.85,1.0), h2);
    }
    return col;
  }

  // ── ACES filmic tonemapping ───────────────────────────────────────────────────
  vec3 aces(vec3 x) {
    return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0);
  }

  // ── Main ─────────────────────────────────────────────────────────────────────
  void main() {
    // Ray direction from screen UV through camera
    vec2 uv  = (gl_FragCoord.xy / uResolution - 0.5);
    uv.x    *= uResolution.x / uResolution.y;
    vec3 dir = normalize(uCamRight * uv.x * uFov
                       + uCamUp   * uv.y * uFov
                       + uCamFwd);

    vec3 pos     = uCamPos;
    vec3 vel     = dir;
    vec3 prevPos = pos;

    vec3  finalColor = vec3(0.0);
    float hitCount   = 0.0;
    bool  absorbed   = false;   // fell into event horizon
    bool  escaped    = false;   // reached background
    float minR       = 1e6;     // track closest approach to BH centre

    int maxSteps = int(clamp(uSteps, 50.0, 500.0));

    for (int i = 0; i < 500; i++) {
      if (i >= maxSteps) break;

      float r  = length(pos);
      minR     = min(minR, r);   // record closest approach

      float rNorm = r / uRs;
      float dt = uStepSz * clamp((rNorm - 1.0) * 0.4, 0.015, 1.5);

      // ── Event horizon ──────────────────────────────────────────────────────
      if (r < uRs * 0.55) {
        absorbed = true;
        break;
      }

      // ── Disk intersection ──────────────────────────────────────────────────
      // Fires when the ray crosses the disk plane (y sign flip) within disk radii
      if (prevPos.y * pos.y < 0.0) {
        float alpha = prevPos.y / (prevPos.y - pos.y);
        vec3  hit   = mix(prevPos, pos, alpha);
        float hr    = length(hit.xz);
        float hy    = abs(hit.y);
        if (hr > uDiskInn && hr < uDiskOut && hy < uDiskThk) {
          finalColor  += diskColor(hit, hitCount);
          hitCount    += 1.0;
          // Keep tracing — subsequent crossings are higher-order lensed images
        }
      }

      // ── Escaped ────────────────────────────────────────────────────────────
      if (r > 60.0) {
        finalColor += starfield(vel);
        escaped = true;
        break;
      }

      prevPos = pos;
      rk4(pos, vel, dt);
    }

    if (!absorbed && !escaped) finalColor += starfield(vel);

    // ── Photon ring ──────────────────────────────────────────────────────────
    // Rays whose closest approach was near r = 1.5 Rs (photon sphere) form
    // the ring.  uPSFresnel separates the ring from the disk: each disk
    // crossing (hitCount) exponentially suppresses the ring contribution,
    // so the ring appears at the shadow boundary but not on the disk face.
    if (!absorbed) {
      float psR      = uRs * 1.5;
      float delta    = abs(minR - psR) / (uRs * uPSWidth);
      float diskMask = exp(-hitCount * uPSFresnel);   // 1 = no disk hits, →0 as disk hits grow
      float psGlow   = exp(-delta * delta) * uPSBright * diskMask;
      finalColor    += psGlow * vec3(0.88, 0.94, 1.0);
    }

    if (absorbed) finalColor = vec3(0.0);

    // Exposure + ACES + gamma
    finalColor = aces(finalColor * uExposure);
    finalColor = pow(finalColor, vec3(1.0 / 2.2));

    gl_FragColor = vec4(finalColor, 1.0);
  }
`

// ── Fullscreen quad ───────────────────────────────────────────────────────────
const quad = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms, depthTest: false, depthWrite: false })
)
quad.frustumCulled = false
scene.add(quad)

// ── UI wiring ─────────────────────────────────────────────────────────────────
function bind(id, valId, dec, fn) {
  const inp = document.getElementById(id)
  const vEl = document.getElementById(valId)
  inp.addEventListener('input', () => {
    const v = parseFloat(inp.value); vEl.textContent = v.toFixed(dec); fn(v)
  })
}

bind('Rs',       'RsV',       2, v => uniforms.uRs.value       = v)
bind('diskInn',  'diskInnV',  2, v => uniforms.uDiskInn.value   = v)
bind('diskOut',  'diskOutV',  2, v => uniforms.uDiskOut.value   = v)
bind('diskThk',  'diskThkV',  2, v => uniforms.uDiskThk.value   = v)
bind('diskBri',  'diskBriV',  2, v => uniforms.uDiskBri.value   = v)
bind('doppler',  'dopplerV',  2, v => uniforms.uDoppler.value   = v)
bind('rotSpd',   'rotSpdV',   2, v => uniforms.uRotSpd.value    = v)
bind('streaks',  'streaksV',  1, v => uniforms.uStreaks.value    = v)
bind('psBright', 'psBrightV', 2, v => uniforms.uPSBright.value   = v)
bind('psWidth',   'psWidthV',   2, v => uniforms.uPSWidth.value   = v)
bind('psFresnel', 'psFresnelV', 1, v => uniforms.uPSFresnel.value = v)
bind('steps',    'stepsV',    0, v => uniforms.uSteps.value      = v)
bind('stepSz',   'stepSzV',   2, v => uniforms.uStepSz.value    = v)
bind('expo',     'expoV',     2, v => uniforms.uExposure.value  = v)
bind('rotat',    'rotatV',    2, v => { orbitCtrl.autoRotateSpeed = v; orbitCtrl.autoRotate = v > 0 })

// ── Settings ──────────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id) }
function getSettings() {
  return ['Rs','diskInn','diskOut','diskThk','diskBri','doppler','rotSpd',
          'streaks','psBright','psWidth','psFresnel','steps','stepSz','expo','rotat']
    .reduce((o, id) => { o[id] = +el(id).value; return o }, {})
}
function applySettings(s) {
  Object.keys(s).forEach(id => {
    const inp = document.getElementById(id); if (!inp) return
    inp.value = s[id]; inp.dispatchEvent(new Event('input'))
  })
}
let toastTimer
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show')
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2200)
}
el('btn-export').addEventListener('click', () => {
  Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([JSON.stringify(getSettings(),null,2)],{type:'application/json'})),
    download: 'bh-settings.json',
  }).click(); toast('Exported bh-settings.json')
})
el('btn-import').addEventListener('click', () => el('import-file').click())
el('import-file').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return
  const r = new FileReader()
  r.onload = ev => { try { applySettings(JSON.parse(ev.target.result)); toast(`Loaded ${file.name}`) } catch { toast('Invalid JSON') } }
  r.readAsText(file); e.target.value = ''
})

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
  uniforms.uResolution.value.set(innerWidth, innerHeight)
  uniforms.uFov.value = Math.tan(THREE.MathUtils.degToRad(camera.fov / 2))
})

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
;(function loop() {
  requestAnimationFrame(loop)
  const dt = clock.getDelta()
  uniforms.uTime.value += dt

  // Extract camera basis vectors for the shader
  camera.updateMatrixWorld()
  const m = camera.matrixWorld
  uniforms.uCamPos.value.setFromMatrixPosition(m)
  uniforms.uCamRight.value.setFromMatrixColumn(m, 0)
  uniforms.uCamUp.value.setFromMatrixColumn(m, 1)
  uniforms.uCamFwd.value.setFromMatrixColumn(m, 2).negate()  // camera looks in -Z
  uniforms.uFov.value = Math.tan(THREE.MathUtils.degToRad(camera.fov / 2))

  orbitCtrl.update()
  renderer.render(scene, camera)
})()
</script>
</body>
</html>
