<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Metaballs — @st-metaball-core</title>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { background:#080c14; overflow:hidden; font:11px/1.6 monospace; color:#ccc }
canvas { display:block }
#ui {
  position:absolute; top:12px; left:12px;
  background:rgba(0,0,0,.7); padding:10px 14px; border-radius:5px;
  display:flex; flex-direction:column; gap:7px; min-width:240px;
}
#ui h3 { color:#fff; font-size:12px }
#ui p  { color:#7df; line-height:1.7 }
#tabs { display:flex; gap:5px; flex-wrap:wrap }
.tab {
  padding:3px 9px; border-radius:3px; cursor:pointer; font:11px monospace;
  background:rgba(255,255,255,.07); border:1px solid #333; color:#aaa
}
.tab.active { border-color:#4af; color:#8cf }
.row { display:flex; justify-content:space-between; align-items:center; gap:6px }
.row span:first-child { min-width:80px }
input[type=range] { width:100px }
.val { min-width:32px; text-align:right; color:#7df }
</style>
</head>
<body>
<div id="ui">
  <h3>Metaballs — @st-metaball-core</h3>
  <p>
    <code>new MetaballWorld({ resolution: 32 })</code><br>
    <code>world.add(new MetaballObject({ radius: 0.5 }))</code><br>
    <code>world.update() // each frame</code>
  </p>
  <div id="tabs"></div>
  <div id="knobs"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three":             "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":     "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-metaball-core": "../../st-metaball-core/dist/index.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { MetaballWorld, MetaballObject } from '@st-metaball-core'

// ── Renderer / Scene / Camera ─────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setPixelRatio(devicePixelRatio)
renderer.setSize(innerWidth, innerHeight)
renderer.shadowMap.enabled = true
document.body.appendChild(renderer.domElement)

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x080c14)

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 40)
camera.position.set(0, 1.5, 5)

const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 0, 0)
controls.enableDamping = true

// Lights
scene.add(new THREE.AmbientLight(0x334466, 2))
const sun = new THREE.DirectionalLight(0xfff0dd, 4)
sun.position.set(5, 8, 4)
sun.castShadow = true
scene.add(sun)
const pl1 = new THREE.PointLight(0x3366ff, 15, 8)
pl1.position.set(-3, 2, 2)
scene.add(pl1)
const pl2 = new THREE.PointLight(0xff4422, 10, 6)
pl2.position.set(3, 1, -2)
scene.add(pl2)

scene.add(new THREE.GridHelper(10, 10, 0x111a28, 0x0d1420))

// ── Presets ───────────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
let world = null, balls = [], animFn = null

function clearScene() {
  if (world) { scene.remove(world.mesh); world = null }
  balls = []
}

const presets = [
  {
    name: 'Orbiting Blobs',
    knobs: [
      { label: 'threshold', min: 0.1,  max: 1.5, step: 0.01, def: 0.45,
        set: v => { world.parameters.threshold = v } },
      { label: 'strength',  min: 0.1,  max: 3.0, step: 0.1,  def: 1.0,
        set: v => balls.forEach(b => { b.parameters.strength = v }) },
    ],
    build(v) {
      clearScene()
      world = new MetaballWorld({
        resolution: 30,
        extent: 1.4,
        threshold: v.threshold,
        material: new THREE.MeshStandardMaterial({ color: 0x44aaff, roughness: 0.3, metalness: 0.2 }),
      })
      for (let i = 0; i < 4; i++)
        balls.push(new MetaballObject({ strength: v.strength }))
      world.add(...balls)
      scene.add(world.mesh)
      animFn = t => {
        balls[0].position.set(Math.sin(t*0.8)*0.7,  Math.cos(t*0.6)*0.4,  0)
        balls[1].position.set(Math.cos(t*0.9)*0.7, -Math.cos(t*0.5)*0.4,  0)
        balls[2].position.set(0, Math.sin(t*0.7)*0.6,  Math.cos(t*1.1)*0.5)
        balls[3].position.set(0, Math.cos(t*0.8)*0.35, Math.sin(t*0.9)*0.6)
        world.update()
      }
    },
  },
  {
    name: 'Negative Carve',
    knobs: [
      { label: 'threshold', min: 0.1,  max: 1.5, step: 0.01, def: 0.55,
        set: v => { world.parameters.threshold = v } },
      { label: 'blob str',  min: 0.5,  max: 4.0, step: 0.1,  def: 2.0,
        set: v => { if (balls[0]) balls[0].parameters.strength = v } },
      { label: 'neg str',   min: 0.5,  max: 4.0, step: 0.1,  def: 1.5,
        set: v => { if (balls[1]) balls[1].parameters.strength = v } },
    ],
    build(v) {
      clearScene()
      world = new MetaballWorld({
        resolution: 32,
        extent: 1.2,
        threshold: v.threshold,
        material: new THREE.MeshStandardMaterial({ color: 0xff7733, roughness: 0.3, metalness: 0.1 }),
      })
      balls.push(new MetaballObject({ strength: v['blob str'] }))
      balls.push(new MetaballObject({ strength: v['neg str'], negative: true }))
      world.add(...balls)
      scene.add(world.mesh)
      animFn = t => {
        balls[0].position.set(0, 0, 0)
        balls[1].position.set(Math.sin(t)*0.28, Math.cos(t*1.3)*0.22, Math.sin(t*0.7)*0.2)
        world.update()
      }
    },
  },
  {
    name: 'Lava Lamp',
    knobs: [
      { label: 'threshold', min: 0.1,  max: 1.5, step: 0.01, def: 0.35,
        set: v => { world.parameters.threshold = v } },
      { label: 'speed',     min: 0.1,  max: 3.0, step: 0.1,  def: 0.8,
        set: _v => {} },
    ],
    build(v) {
      clearScene()
      world = new MetaballWorld({
        resolution: 30,
        extent: 1.2,
        threshold: v.threshold,
        material: new THREE.MeshStandardMaterial({
          color: 0xff2255, roughness: 0.15, metalness: 0.05,
          emissive: new THREE.Color(0.1, 0.0, 0.03),
        }),
      })
      for (let i = 0; i < 6; i++)
        balls.push(new MetaballObject({ strength: 0.8 + Math.random() * 0.4 }))
      world.add(...balls)
      scene.add(world.mesh)
      const offs = balls.map(() => [Math.random()*6.28, Math.random()*6.28, Math.random()*6.28])
      animFn = t => {
        const s = v.speed
        balls.forEach((b, i) => {
          b.position.set(
            Math.sin(t*s*0.5 + offs[i][0]) * 0.55,
            Math.sin(t*s*0.4 + offs[i][1]) * 0.55,
            Math.cos(t*s*0.6 + offs[i][2]) * 0.45,
          )
        })
        world.update()
      }
    },
  },
]

// ── UI ────────────────────────────────────────────────────────────────────────
const tabsEl  = document.getElementById('tabs')
const knobsEl = document.getElementById('knobs')

function activatePreset(i, preset) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i))
  const state = {}
  preset.knobs.forEach(k => { state[k.label] = k.def })
  knobsEl.innerHTML = ''
  for (const k of preset.knobs) {
    const row = document.createElement('div')
    row.className = 'row'
    const valEl = document.createElement('span')
    valEl.className = 'val'
    valEl.textContent = k.def.toFixed(2)
    const inp = document.createElement('input')
    inp.type = 'range'; inp.min = k.min; inp.max = k.max; inp.step = k.step; inp.value = k.def
    inp.addEventListener('input', () => {
      state[k.label] = +inp.value
      valEl.textContent = (+inp.value).toFixed(2)
      if (world) k.set(+inp.value)
    })
    row.innerHTML = `<span>${k.label}</span>`
    row.appendChild(inp); row.appendChild(valEl)
    knobsEl.appendChild(row)
  }
  preset.build({ ...state })
}

presets.forEach((p, i) => {
  const btn = document.createElement('div')
  btn.className = 'tab'; btn.textContent = p.name
  btn.addEventListener('click', () => activatePreset(i, p))
  tabsEl.appendChild(btn)
})
activatePreset(0, presets[0])

// ── Render loop ───────────────────────────────────────────────────────────────
let elapsed = 0
renderer.setAnimationLoop(() => {
  elapsed += Math.min(clock.getDelta(), 0.05)
  if (animFn) animFn(elapsed)
  controls.update()
  renderer.render(scene, camera)
})

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
