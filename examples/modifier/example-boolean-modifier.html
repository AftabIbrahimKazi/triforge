<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BooleanModifier — @st-modifier-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060810; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }
  #info {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
    max-width: 300px; line-height: 1.8;
  }
  #info h3 { color: #fff; font-size: 12px; margin-bottom: 4px; }
  .code { color: #7df; }
  #tabs {
    position: absolute; top: 12px; right: 14px;
    display: flex; gap: 6px;
  }
  .tab {
    background: rgba(0,0,0,0.6); border: 1px solid #333;
    padding: 5px 12px; border-radius: 4px; cursor: pointer;
    color: #aaa; font: 11px monospace;
  }
  .tab.active { border-color: #4488ff; color: #88bbff; }
  #panel {
    position: absolute; bottom: 14px; left: 14px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
    display: flex; flex-direction: column; gap: 5px; min-width: 240px;
  }
  label { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  input[type=range] { width: 120px; }
</style>
</head>
<body>
<div id="info">
  <h3>Boolean Modifier</h3>
  <b>Union</b> — merge two shapes into one<br>
  <b>Difference</b> — cut a hole through a shape<br>
  <b>Intersection</b> — keep only the overlap<br><br>
  <span class="code">new BooleanModifier({ operand, operation })</span><br>
  Requires watertight (manifold) geometries.
</div>
<div id="tabs"></div>
<div id="panel"></div>

<script type="importmap">
{
  "imports": {
    "three":              "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":      "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-modifier-core":  "../../st-modifier-core/dist/index.js",
    "three-mesh-bvh":     "https://unpkg.com/three-mesh-bvh@0.9.0/build/index.module.js",
    "three-bvh-csg":      "https://unpkg.com/three-bvh-csg@0.0.18/build/index.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { ModifierStack, BooleanModifier } from '@st-modifier-core'

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x060810)
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100)
camera.position.set(0, 2, 6)
const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 0, 0)

scene.add(new THREE.AmbientLight(0xffffff, 0.4))
const sun = new THREE.DirectionalLight(0xfff0ee, 1.5)
sun.position.set(4, 8, 3)
scene.add(sun)
scene.add(new THREE.GridHelper(10, 10, 0x111122, 0x0a0a18))

// ── Ghost wireframe for the operand ─────────────────────────────────────────
let resultMesh = null
let operandGhost = null

function clearScene() {
  if (resultMesh)  { scene.remove(resultMesh);  resultMesh.geometry.dispose() }
  if (operandGhost){ scene.remove(operandGhost); operandGhost.geometry.dispose() }
  resultMesh = operandGhost = null
}

function buildDemo({ baseType, operandType, operation, operandScale, operandOffsetX }) {
  clearScene()

  // Base geometry
  const baseGeo = baseType === 'box'
    ? new THREE.BoxGeometry(1.6, 1.6, 1.6)
    : new THREE.SphereGeometry(0.9, 32, 24)

  // Operand geometry
  const operandGeo = operandType === 'sphere'
    ? new THREE.SphereGeometry(operandScale, 24, 18)
    : new THREE.CylinderGeometry(operandScale * 0.5, operandScale * 0.5, 2.5, 24)

  // Optional offset
  if (Math.abs(operandOffsetX) > 0.01) operandGeo.translate(operandOffsetX, 0, 0)

  // Run boolean
  const stack = new ModifierStack(baseGeo)
  stack.add(new BooleanModifier({ operand: operandGeo, operation }))
  const result = stack.apply()

  const mat = new THREE.MeshStandardMaterial({
    color: operation === 'union'        ? 0x44aaff
         : operation === 'difference'   ? 0xff6644
         :                               0x88ee55,
    roughness: 0.3, metalness: 0.15,
  })
  resultMesh = new THREE.Mesh(result, mat)
  scene.add(resultMesh)

  // Show operand as transparent ghost
  operandGhost = new THREE.Mesh(
    operandGeo.clone(),
    new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, opacity: 0.12, transparent: true }),
  )
  scene.add(operandGhost)

  baseGeo.dispose()
  operandGeo.dispose()
}

// ── Preset system ─────────────────────────────────────────────────────────────
const presets = [
  {
    name: 'Difference',
    knobs: [
      { label: 'cutter size', key: 'operandScale', min: 0.2, max: 1.2, step: 0.05, def: 0.7 },
      { label: 'cutter X',    key: 'operandOffsetX', min: -0.8, max: 0.8, step: 0.05, def: 0 },
    ],
    fn: (v) => buildDemo({ baseType: 'box', operandType: 'sphere', operation: 'difference', ...v }),
  },
  {
    name: 'Union',
    knobs: [
      { label: 'sphere size', key: 'operandScale', min: 0.2, max: 1.2, step: 0.05, def: 0.65 },
      { label: 'offset X',    key: 'operandOffsetX', min: -1, max: 1, step: 0.05, def: 0.6 },
    ],
    fn: (v) => buildDemo({ baseType: 'box', operandType: 'sphere', operation: 'union', ...v }),
  },
  {
    name: 'Intersection',
    knobs: [
      { label: 'sphere size', key: 'operandScale', min: 0.4, max: 1.4, step: 0.05, def: 1.0 },
      { label: 'offset X',    key: 'operandOffsetX', min: -0.8, max: 0.8, step: 0.05, def: 0 },
    ],
    fn: (v) => buildDemo({ baseType: 'sphere', operandType: 'sphere', operation: 'intersection', ...v }),
  },
  {
    name: 'Cylinder Cut',
    knobs: [
      { label: 'cylinder r', key: 'operandScale', min: 0.1, max: 0.8, step: 0.05, def: 0.4 },
      { label: 'offset X',   key: 'operandOffsetX', min: -0.8, max: 0.8, step: 0.05, def: 0 },
    ],
    fn: (v) => buildDemo({ baseType: 'box', operandType: 'cylinder', operation: 'difference', ...v }),
  },
]

const panelEl = document.getElementById('panel')
const tabsEl  = document.getElementById('tabs')

function activatePreset(i) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i))
  const preset = presets[i]
  const v = {}
  preset.knobs.forEach(k => { v[k.key] = k.def })

  panelEl.innerHTML = ''
  for (const k of preset.knobs) {
    const row = document.createElement('label')
    const val = document.createElement('span')
    const inp = document.createElement('input')
    inp.type = 'range'; inp.min = k.min; inp.max = k.max; inp.step = k.step; inp.value = k.def
    val.textContent = (+inp.value).toFixed(2)
    inp.addEventListener('input', () => {
      v[k.key] = +inp.value
      val.textContent = (+inp.value).toFixed(2)
      preset.fn(v)
    })
    row.innerHTML = `<span>${k.label}</span>`
    row.appendChild(inp); row.appendChild(val)
    panelEl.appendChild(row)
  }

  preset.fn(v)
}

presets.forEach((p, i) => {
  const btn = document.createElement('div')
  btn.className = 'tab'
  btn.textContent = p.name
  btn.addEventListener('click', () => activatePreset(i))
  tabsEl.appendChild(btn)
})
activatePreset(0)

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime()
  if (resultMesh)  resultMesh.rotation.y  = t * 0.3
  if (operandGhost) operandGhost.rotation.y = t * 0.3
  controls.update()
  renderer.render(scene, camera)
})

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
