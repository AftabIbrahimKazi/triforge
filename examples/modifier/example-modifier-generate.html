<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate Modifiers — @st-modifier-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }
  #info { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 4px; }
  #labels { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .label { position: absolute; transform: translateX(-50%); background: rgba(0,0,0,0.6);
    padding: 2px 7px; border-radius: 3px; font: 10px monospace; color: #eee; white-space: nowrap; }
</style>
</head>
<body>
<div id="info">Generate Modifiers — @st-modifier-core<br>ArrayModifier · ExtrudeModifier · SolidifyModifier</div>
<div id="labels"></div>
<script type="importmap">
{
  "imports": {
    "three":              "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":      "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-modifier-core":  "../../st-modifier-core/dist/index.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import {
  ModifierStack, NormalRecalculateModifier,
  ArrayModifier, ExtrudeModifier, SolidifyModifier
} from '@st-modifier-core'

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
renderer.shadowMap.enabled = true
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x0d0d0d)
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200)
camera.position.set(0, 4, 18)
const controls = new OrbitControls(camera, renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff, 0.4))
const sun = new THREE.DirectionalLight(0xffffff, 2.5)
sun.position.set(5, 10, 5)
sun.castShadow = true
scene.add(sun)

const mat = new THREE.MeshStandardMaterial({ color: 0x44aa88, roughness: 0.5, metalness: 0.1, side: THREE.DoubleSide })

// ArrayModifier — repeat a box along X
const boxBase  = new THREE.BoxGeometry(0.8, 0.8, 0.8)
const arrStack = new ModifierStack(boxBase)
arrStack.add(new ArrayModifier({ count: 5, offsetX: 1.1, offsetY: 0, offsetZ: 0 }))
arrStack.add(new NormalRecalculateModifier())
const arrMesh = new THREE.Mesh(arrStack.apply(), mat.clone())
arrMesh.position.set(-4, 0, 0)
arrMesh.castShadow = true
scene.add(arrMesh)

// ExtrudeModifier — extrude faces of a torus knot cross-section
const extBase  = new THREE.TorusGeometry(1.0, 0.3, 8, 24)
const extStack = new ModifierStack(extBase)
extStack.add(new ExtrudeModifier({ amount: 0.25 }))
extStack.add(new NormalRecalculateModifier())
const extMesh = new THREE.Mesh(extStack.apply(), mat.clone())
extMesh.position.set(0, 0, 0)
extMesh.castShadow = true
scene.add(extMesh)

// SolidifyModifier — add shell thickness to a plane
const planeBase  = new THREE.PlaneGeometry(2.5, 2.5, 8, 8)
const solidStack = new ModifierStack(planeBase)
solidStack.add(new SolidifyModifier({ thickness: 0.2, offset: 0.0 }))
solidStack.add(new NormalRecalculateModifier())
const solidMesh = new THREE.Mesh(solidStack.apply(), mat.clone())
solidMesh.position.set(4, 0, 0)
solidMesh.castShadow = true
scene.add(solidMesh)

const defs = [
  { name: 'ArrayModifier\n(count:5, offsetX:1.1)', mesh: arrMesh },
  { name: 'ExtrudeModifier\n(amount:0.25)',         mesh: extMesh },
  { name: 'SolidifyModifier\n(thickness:0.2)',      mesh: solidMesh }
]

const labels = document.getElementById('labels')
const labelEls = defs.map(({ name }) => {
  const el = document.createElement('div')
  el.className = 'label'
  el.textContent = name
  labels.appendChild(el)
  return el
})

function projectLabel(mesh, lbl) {
  const v = mesh.position.clone().project(camera)
  lbl.style.left = ((v.x * 0.5 + 0.5) * innerWidth) + 'px'
  lbl.style.top  = ((-v.y * 0.5 + 0.5) * innerHeight + 78) + 'px'
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

;(function animate() {
  requestAnimationFrame(animate)
  controls.update()
  defs.forEach(({ mesh }, i) => projectLabel(mesh, labelEls[i]))
  renderer.render(scene, camera)
})()
</script>
</body>
</html>
