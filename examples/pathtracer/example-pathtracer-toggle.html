<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raster ↔ Path Tracer Toggle — @st-pathtracer-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060810; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }

  #info {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.72); padding: 10px 14px; border-radius: 4px;
    max-width: 320px; line-height: 1.8;
  }
  #info h3 { color: #fff; font-size: 12px; margin-bottom: 4px; }
  .code { color: #7df; }

  #controls {
    position: absolute; top: 12px; right: 14px;
    display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
  }
  .toggle-row { display: flex; gap: 6px; }
  .btn {
    background: rgba(0,0,0,0.6); border: 1px solid #333;
    padding: 6px 14px; border-radius: 4px; cursor: pointer;
    color: #aaa; font: 11px monospace; transition: all 0.15s;
  }
  .btn:hover { border-color: #666; color: #fff; }
  .btn.active { border-color: #4488ff; color: #88bbff; background: rgba(40,80,160,0.25); }

  #status {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.72); padding: 6px 16px; border-radius: 20px;
    font: 11px monospace; color: #aaa; transition: color 0.3s;
    pointer-events: none;
  }
  #status.converging { color: #ffcc44; }
  #status.converged  { color: #44ff88; }

  #panel, #pt-panel {
    position: absolute; bottom: 14px; left: 14px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
    display: flex; flex-direction: column; gap: 6px; min-width: 220px;
  }
  #pt-panel { left: auto; right: 14px; display: none; }
  #pt-panel.visible { display: flex; }
  #pt-panel h4 { color: #88bbff; font-size: 11px; margin-bottom: 2px; }
  .pt-note { color: #666; font-size: 10px; line-height: 1.5; margin-top: 1px; }
  label { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  input[type=range] { width: 120px; }
  input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; }
</style>
</head>
<body>

<div id="info">
  <h3>Raster ↔ Path Tracer Toggle</h3>
  <b>Raster</b> — real-time, 60fps, approximate lighting<br>
  <b>Path Tracer</b> — physically correct, accumulates samples<br><br>
  Same scene, same materials, same camera.<br>
  <span class="code">RenderManager.setMode('pathtracer')</span><br>
  <span class="code">MaterialOutput.toPhysicalMaterial()</span>
</div>

<div id="controls">
  <div class="toggle-row">
    <button class="btn active" id="btnRaster">Raster</button>
    <button class="btn"        id="btnPT">Path Tracer</button>
  </div>
</div>

<div id="panel"></div>
<div id="pt-panel"></div>
<div id="status">Raster mode</div>

<script type="importmap">
{
  "imports": {
    "three":                    "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":            "https://unpkg.com/three@0.165.0/examples/jsm/",
    "three/examples/jsm/":      "https://unpkg.com/three@0.165.0/examples/jsm/",
    "three-mesh-bvh":           "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.7.8/build/index.module.js",
    "three-gpu-pathtracer":     "https://cdn.jsdelivr.net/npm/three-gpu-pathtracer@0.0.24/build/index.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { WebGLPathTracer } from 'three-gpu-pathtracer'
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js'

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
renderer.toneMapping        = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.0
renderer.outputColorSpace   = THREE.SRGBColorSpace
document.body.appendChild(renderer.domElement)

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene  = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100)
camera.position.set(0, 2, 6)

const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 0.5, 0)
controls.update()

// Environment
scene.background = new THREE.Color(0x111827)
const envLight = new THREE.HemisphereLight(0x8899bb, 0x223344, 1.2)
scene.add(envLight)
const sun = new THREE.DirectionalLight(0xfff5e0, 3.0)
sun.position.set(4, 8, 3)
sun.castShadow = true
scene.add(sun)

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(12, 12),
  new THREE.MeshPhysicalMaterial({ color: 0x202030, roughness: 0.8, metalness: 0 })
)
ground.rotation.x = -Math.PI / 2
ground.receiveShadow = true
scene.add(ground)

// Objects — each demonstrating a different material type
const objects = [
  // Shiny metal sphere
  { geo: new THREE.SphereGeometry(0.6, 64, 32),
    mat: new THREE.MeshPhysicalMaterial({ color: 0xddaa44, metalness: 1.0, roughness: 0.05 }),
    pos: [-2.5, 0.6, 0] },

  // Matte diffuse sphere
  { geo: new THREE.SphereGeometry(0.6, 64, 32),
    mat: new THREE.MeshPhysicalMaterial({ color: 0xcc3322, metalness: 0, roughness: 0.9 }),
    pos: [0, 0.6, 0] },

  // Glass sphere — transmission
  { geo: new THREE.SphereGeometry(0.6, 64, 32),
    mat: new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 1.0, roughness: 0.0, ior: 1.5, thickness: 1.2, transparent: true }),
    pos: [2.5, 0.6, 0] },

  // Rough metal box
  { geo: new THREE.BoxGeometry(1, 1, 1),
    mat: new THREE.MeshPhysicalMaterial({ color: 0x8899aa, metalness: 0.9, roughness: 0.4 }),
    pos: [-1.2, 0.5, -1.5] },

  // Emissive torus
  { geo: new THREE.TorusGeometry(0.4, 0.15, 32, 64),
    mat: new THREE.MeshPhysicalMaterial({ color: 0xffffff, emissive: new THREE.Color(0.2, 0.6, 1.0), emissiveIntensity: 4.0 }),
    pos: [1.2, 0.5, -1.5] },
]

for (const { geo, mat, pos } of objects) {
  const mesh = new THREE.Mesh(geo, mat)
  mesh.position.set(...pos)
  mesh.castShadow = true
  mesh.receiveShadow = true
  scene.add(mesh)
}

// ── Path Tracer ───────────────────────────────────────────────────────────────
const pathTracer = new WebGLPathTracer(renderer)
pathTracer.physicallyCorrectLights = true
pathTracer.samplesPerFrame = 4

let ptReady       = false
let ptMode        = false  // false = raster, true = pathtracer
let ptInitialized = false

async function initPathTracer() {
  if (ptInitialized) return
  statusEl.textContent = 'Building BVH…'
  await pathTracer.setScene(scene, camera)
  ptInitialized = true
}

// ── UI ────────────────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status')
const btnRaster = document.getElementById('btnRaster')
const btnPT     = document.getElementById('btnPT')

btnRaster.addEventListener('click', () => {
  ptMode = false
  btnRaster.classList.add('active')
  btnPT.classList.remove('active')
  ptPanelEl.classList.remove('visible')
  statusEl.className = ''
  statusEl.textContent = 'Raster mode'
})

btnPT.addEventListener('click', async () => {
  await initPathTracer()
  pathTracer.reset()
  ptMode = true
  btnPT.classList.add('active')
  btnRaster.classList.remove('active')
  ptPanelEl.classList.add('visible')
  statusEl.className = 'converging'
  statusEl.textContent = 'Path tracer — accumulating…'
})

// Pre-build BVH on load so the first toggle is instant
window.addEventListener('load', () => initPathTracer(), { once: true })

// ── Scene panel ───────────────────────────────────────────────────────────────
const panelEl = document.getElementById('panel')
const sceneKnobs = [
  { label: 'sun intensity', min: 0, max: 8, step: 0.1, def: 3.0,
    set: v => { sun.intensity = v } },
  { label: 'exposure', min: 0.1, max: 3, step: 0.05, def: 1.0,
    set: v => { renderer.toneMappingExposure = v } },
]
for (const k of sceneKnobs) {
  const row = document.createElement('label')
  const val = document.createElement('span')
  const inp = document.createElement('input')
  inp.type = 'range'; inp.min = k.min; inp.max = k.max; inp.step = k.step; inp.value = k.def
  val.textContent = (+inp.value).toFixed(2)
  inp.addEventListener('input', () => {
    k.set(+inp.value); val.textContent = (+inp.value).toFixed(2)
    if (ptMode && ptInitialized) pathTracer.reset()
  })
  row.innerHTML = `<span>${k.label}</span>`
  row.appendChild(inp); row.appendChild(val)
  panelEl.appendChild(row)
}

// ── Path-tracer quality panel ─────────────────────────────────────────────────
const ptPanelEl = document.getElementById('pt-panel')
ptPanelEl.innerHTML = '<h4>Path Tracer Quality</h4>'

function addSlider(container, label, min, max, step, def, note, onChange) {
  const row = document.createElement('label')
  const val = document.createElement('span')
  const inp = document.createElement('input')
  inp.type = 'range'; inp.min = min; inp.max = max; inp.step = step; inp.value = def
  val.textContent = (+inp.value).toFixed(step < 0.1 ? 2 : 0)
  inp.addEventListener('input', () => {
    val.textContent = (+inp.value).toFixed(step < 0.1 ? 2 : 0)
    onChange(+inp.value)
    pathTracer.reset()
  })
  row.innerHTML = `<span>${label}</span>`
  row.appendChild(inp); row.appendChild(val)
  container.appendChild(row)
  if (note) {
    const n = document.createElement('div')
    n.className = 'pt-note'; n.textContent = note
    container.appendChild(n)
  }
}

function addCheckbox(container, label, def, note, onChange) {
  const row = document.createElement('label')
  const inp = document.createElement('input')
  inp.type = 'checkbox'; inp.checked = def
  inp.addEventListener('change', () => { onChange(inp.checked); pathTracer.reset() })
  row.innerHTML = `<span>${label}</span>`
  row.appendChild(inp)
  container.appendChild(row)
  if (note) {
    const n = document.createElement('div')
    n.className = 'pt-note'; n.textContent = note
    container.appendChild(n)
  }
}

addSlider(ptPanelEl,
  'render scale', 0.25, 1, 0.05, 1,
  'Lower = faster convergence, softer image.',
  v => { pathTracer.renderScale = v }
)
addSlider(ptPanelEl,
  'bounces', 1, 20, 1, 10,
  'Ray bounces per sample. Lower = faster, misses GI.',
  v => { pathTracer.bounces = v }
)
addSlider(ptPanelEl,
  'filter glossy', 0, 5, 0.1, 0,
  'Reduces firefly noise. Trade-off: dulls sharp caustics.',
  v => { pathTracer.filterGlossyFactor = v }
)
addCheckbox(ptPanelEl,
  'dynamic low-res', false,
  'Drops to 10% res while camera moves, full res when still.',
  v => { pathTracer.dynamicLowRes = v }
)

// ── Render Loop ───────────────────────────────────────────────────────────────
let lastCamPos = camera.position.clone()

renderer.setAnimationLoop(() => {
  controls.update()

  if (ptMode && ptInitialized) {
    if (!camera.position.equals(lastCamPos)) {
      pathTracer.reset()
      lastCamPos.copy(camera.position)
      statusEl.className = 'converging'
      statusEl.textContent = 'Path tracer — accumulating…'
    }
    pathTracer.updateCamera()
    pathTracer.renderSample()
    const s = pathTracer.samples
    if (s >= 256) {
      statusEl.className = 'converged'
      statusEl.textContent = `Path tracer — converged (${s} samples)`
    } else {
      statusEl.className = 'converging'
      statusEl.textContent = `Path tracer — ${s} samples`
    }
  } else {
    renderer.render(scene, camera)
  }
})

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
  if (ptInitialized) pathTracer.reset()
})
</script>
</body>
</html>
