<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ExpressionDriver — @st-animation-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080810; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }
  #info {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
    line-height: 1.8;
  }
  #info h3 { color: #fff; font-size: 12px; margin-bottom: 4px; }
  .expr { color: #7df; }
  .sep { border-top: 1px solid #333; margin: 5px 0; }
</style>
</head>
<body>
<div id="info">
  <h3>ExpressionDriver — @st-animation-core</h3>
  <div class="sep"></div>
</div>
<script type="importmap">
{
  "imports": {
    "three":               "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":       "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-animation-core":  "../../st-animation-core/dist/index.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { ExpressionDriver } from '@st-animation-core'

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x080810)
scene.add(new THREE.AmbientLight(0xffffff, 0.35))
const dlight = new THREE.DirectionalLight(0xffffff, 1.2)
dlight.position.set(4, 6, 4)
scene.add(dlight)

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100)
camera.position.set(0, 3, 11)
const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 0.5, 0)

// Helper grid
scene.add(new THREE.GridHelper(12, 12, 0x222244, 0x111122))

// ── 5 cubes, each driven by a different expression ──────────────────────────
const defs = [
  {
    label: 'position.y',
    expr:  'abs(sin(t * 3)) * 2',
    color: 0x4488ff,
    drivers: (m) => [new ExpressionDriver(m.position, 'y', 'abs(sin(t * 3)) * 2')],
  },
  {
    label: 'rotation.y',
    expr:  't * 2.5',
    color: 0x44ffaa,
    drivers: (m) => [new ExpressionDriver(m.rotation, 'y', 't * 2.5')],
  },
  {
    label: 'scale (pulse)',
    expr:  '0.6 + abs(sin(t * 4)) * 0.7',
    color: 0xffaa33,
    drivers: (m) => {
      const e = 'Math.max(0.1, 0.6 + abs(sin(t * 4)) * 0.7)'
      return ['x','y','z'].map(ax => new ExpressionDriver(m.scale, ax, e))
    },
  },
  {
    label: 'position x+z (figure-8)',
    expr:  'x: sin(t), z: sin(t*2)*0.5',
    color: 0xff4466,
    drivers: (m) => [
      new ExpressionDriver(m.position, 'x', 'sin(t * 1.5) * 0.6'),
      new ExpressionDriver(m.position, 'z', 'sin(t * 3)   * 0.6'),
    ],
  },
  {
    label: 'rotation.z (custom vars)',
    expr:  'sin(t*freq)*amp  {freq:5, amp:0.8}',
    color: 0xcc44ff,
    drivers: (m) => [
      new ExpressionDriver(m.rotation, 'z', 'sin(t * freq) * amp', { variables: { freq: 5, amp: 0.8 } }),
    ],
  },
]

const meshes  = []
const drivers = []

defs.forEach((def, i) => {
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.7, 0.7, 0.7),
    new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.3, metalness: 0.2 }),
  )
  mesh.position.x = (i - 2) * 2.2
  scene.add(mesh)
  meshes.push(mesh)
  for (const d of def.drivers(mesh)) drivers.push(d)
})

// ── Info panel ───────────────────────────────────────────────────────────────
const info = document.getElementById('info')
defs.forEach((def, i) => {
  const line = document.createElement('div')
  line.innerHTML = `<span style="color:${new THREE.Color(def.color).getStyle()}">[${i}]</span> ${def.label}<br><span class="expr">${def.expr}</span>`
  if (i < defs.length - 1) {
    const sep = document.createElement('div'); sep.className = 'sep'; info.appendChild(sep)
  }
  info.appendChild(line)
})

// ── Render loop ──────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime()
  for (const d of drivers) d.update(t)
  controls.update()
  renderer.render(scene, camera)
})

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
