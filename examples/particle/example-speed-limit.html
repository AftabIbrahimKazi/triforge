<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Speed Limit (E2) — st-particle-core</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d14; overflow: hidden; font-family: monospace; color: #eee; }
canvas { display: block; }

#ui {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 14px 20px; pointer-events: none;
}
.panel {
  background: rgba(0,0,0,.65); border-radius: 8px; padding: 10px 16px;
  pointer-events: all; line-height: 1.9;
}
.title { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
label { display: flex; align-items: center; gap: 8px; font-size: 12px; }
input[type=range] { width: 120px; }

#label-left  { position:fixed; left:25%;  bottom:60px; transform:translateX(-50%); font-size:13px; color:#ff6666; text-align:center; }
#label-right { position:fixed; left:75%;  bottom:60px; transform:translateX(-50%); font-size:13px; color:#66ff99; text-align:center; }
</style>
</head>
<body>

<div id="ui">
  <div class="panel">
    <div class="title">Speed Limit — E2</div>
    <label>Limit:
      <input type="range" id="rLimit" min="1" max="30" step="0.5" value="8">
      <span id="lblLimit">8</span> m/s
    </label>
    <label>Gravity:
      <input type="range" id="rGrav" min="0" max="3" step="0.05" value="1">
      <span id="lblGrav">1</span>×
    </label>
  </div>
  <div class="panel" id="stats" style="font-size:12px;line-height:1.8;">—</div>
</div>

<div id="label-left">NO LIMIT<br><span id="spd-left">—</span></div>
<div id="label-right">LIMIT ACTIVE<br><span id="spd-right">—</span></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

// ── Renderer / Scene ───────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setPixelRatio(devicePixelRatio)
renderer.setSize(innerWidth, innerHeight)
document.body.prepend(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x0d0d14)
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.01, 300)
camera.position.set(0, 8, 28)
camera.lookAt(0, 5, 0)

const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 5, 0)
controls.enableDamping = true

// ── Floor ──────────────────────────────────────────────────────────────────
scene.add(new THREE.GridHelper(40, 40, 0x222233, 0x181828))

// ── Dividing line between left (no limit) and right (limit) ───────────────
{
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, -5), new THREE.Vector3(0, 20, -5),
  ])
  scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0x444466, transparent: true, opacity: 0.5 })))
}

// ── Particle setup ─────────────────────────────────────────────────────────
const COUNT = 150   // per side
const SPAWN_X_LEFT  = -5   // fountain centre X for uncapped
const SPAWN_X_RIGHT =  5   // fountain centre X for capped

function makeParticle(side) {
  const cx = side === 'left' ? SPAWN_X_LEFT : SPAWN_X_RIGHT
  const angle = Math.random() * Math.PI * 2
  const spread = Math.random() * 1.2
  return {
    pos: new THREE.Vector3(cx + Math.cos(angle) * spread * 0.3, 0.1, Math.sin(angle) * spread * 0.3),
    vel: new THREE.Vector3(
      (Math.random() - 0.5) * 4,
      12 + Math.random() * 8,    // strong upward kick
      (Math.random() - 0.5) * 4,
    ),
    life: 0,
    maxLife: 2.5 + Math.random() * 1.5,
    side,
  }
}

const particles = [
  ...Array.from({ length: COUNT }, () => makeParticle('left')),
  ...Array.from({ length: COUNT }, () => makeParticle('right')),
]

// Stagger spawn times so they don't all arrive at once
particles.forEach((p, i) => {
  const age = (i % COUNT) / COUNT * p.maxLife
  p.life = age
  // Advance position to match age (rough pre-integrate without forces)
  p.pos.y += p.vel.y * age * 0.3
})

// ── GPU buffers ────────────────────────────────────────────────────────────
const TOTAL  = COUNT * 2
const posArr = new Float32Array(TOTAL * 3)
const colArr = new Float32Array(TOTAL * 3)
const geo    = new THREE.BufferGeometry()
geo.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3).setUsage(THREE.DynamicDrawUsage))
geo.setAttribute('color',    new THREE.Float32BufferAttribute(colArr, 3).setUsage(THREE.DynamicDrawUsage))

// Large circular sprite texture
const canvas2d = document.createElement('canvas')
canvas2d.width = canvas2d.height = 64
const ctx = canvas2d.getContext('2d')
const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32)
grad.addColorStop(0,   'rgba(255,255,255,1)')
grad.addColorStop(0.4, 'rgba(255,255,255,0.8)')
grad.addColorStop(1,   'rgba(255,255,255,0)')
ctx.fillStyle = grad
ctx.fillRect(0, 0, 64, 64)
const sprite = new THREE.CanvasTexture(canvas2d)

const mat = new THREE.PointsMaterial({
  vertexColors: true, size: 0.6, sizeAttenuation: true,
  map: sprite, transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending,
})
scene.add(new THREE.Points(geo, mat))

// ── Emitter glow rings on the floor ───────────────────────────────────────
for (const [cx, color] of [[SPAWN_X_LEFT, 0xff3333], [SPAWN_X_RIGHT, 0x33ff88]]) {
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.4, 0.7, 32),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5, side: THREE.DoubleSide }),
  )
  ring.rotation.x = -Math.PI / 2
  ring.position.set(cx, 0.01, 0)
  scene.add(ring)
}

// ── Speed-limit ceiling plane (visual reference) ───────────────────────────
// Shown as a faint horizontal band at the height where particles would be
// if they hit the limit. This is purely decorative.
const ceilMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(12, 10),
  new THREE.MeshBasicMaterial({ color: 0x66ff99, transparent: true, opacity: 0.03, side: THREE.DoubleSide }),
)
ceilMesh.rotation.x = Math.PI / 2
ceilMesh.position.set(SPAWN_X_RIGHT, 10, 0)
scene.add(ceilMesh)

// ── Parameters ─────────────────────────────────────────────────────────────
const params = { velocityLimit: 8, gravity: 1 }
const col = new THREE.Color()

document.getElementById('rLimit').addEventListener('input', e => {
  params.velocityLimit = +e.target.value
  document.getElementById('lblLimit').textContent = e.target.value
  // Move the visual ceiling
  ceilMesh.position.y = limitToHeight(params.velocityLimit)
})
document.getElementById('rGrav').addEventListener('input', e => {
  params.gravity = +e.target.value
  document.getElementById('lblGrav').textContent = e.target.value
})

// Rough estimate: at peak height v²=2gh → h = v²/(2g)
function limitToHeight(v) {
  return (v * v) / (2 * 9.81 * Math.max(params.gravity, 0.1))
}
ceilMesh.position.y = limitToHeight(params.velocityLimit)

// ── Animate ────────────────────────────────────────────────────────────────
let lastT = performance.now()
let maxSpeedLeft = 0, maxSpeedRight = 0

;(function animate() {
  requestAnimationFrame(animate)
  const now = performance.now()
  const dt  = Math.min((now - lastT) / 1000, 0.033)
  lastT = now

  maxSpeedLeft  = 0
  maxSpeedRight = 0

  for (let i = 0; i < TOTAL; i++) {
    const p = particles[i]

    // Gravity
    p.vel.y -= 9.81 * params.gravity * dt

    // Speed limit on right side only
    if (p.side === 'right') {
      const speed = p.vel.length()
      if (speed > params.velocityLimit) p.vel.multiplyScalar(params.velocityLimit / speed)
    }

    p.pos.addScaledVector(p.vel, dt)
    p.life += dt

    // Track max speed per side
    const spd = p.vel.length()
    if (p.side === 'left')  maxSpeedLeft  = Math.max(maxSpeedLeft,  spd)
    if (p.side === 'right') maxSpeedRight = Math.max(maxSpeedRight, spd)

    // Respawn when lifetime expires or falls below floor
    if (p.life >= p.maxLife || p.pos.y < -1) {
      const fresh = makeParticle(p.side)
      p.pos.copy(fresh.pos)
      p.vel.copy(fresh.vel)
      p.life    = 0
      p.maxLife = fresh.maxLife
    }

    // Colour: left = orange→red by speed, right = cyan→green by speed relative to limit
    const t = p.side === 'left'
      ? Math.min(spd / 25, 1)
      : Math.min(spd / params.velocityLimit, 1)
    const alpha = Math.sin((p.life / p.maxLife) * Math.PI)  // fade in/out

    if (p.side === 'left') {
      col.setRGB(1, Math.max(0, 0.6 - t * 0.6), 0)
    } else {
      col.setRGB(0, 1 - t * 0.4, 0.6 + t * 0.4)
    }
    colArr[i * 3]     = col.r * alpha
    colArr[i * 3 + 1] = col.g * alpha
    colArr[i * 3 + 2] = col.b * alpha

    posArr[i * 3]     = p.pos.x
    posArr[i * 3 + 1] = p.pos.y
    posArr[i * 3 + 2] = p.pos.z
  }

  geo.attributes.position.needsUpdate = true
  geo.attributes.color.needsUpdate    = true

  document.getElementById('spd-left').textContent  = `max ${maxSpeedLeft.toFixed(1)} m/s`
  document.getElementById('spd-right').textContent = `max ${Math.min(maxSpeedRight, params.velocityLimit + 0.1).toFixed(1)} ≤ ${params.velocityLimit} m/s`
  document.getElementById('stats').textContent =
    `Left (no limit):   peak ${maxSpeedLeft.toFixed(1)} m/s\n` +
    `Right (limited):   peak ≤ ${params.velocityLimit} m/s\n` +
    `Difference:        ${(maxSpeedLeft - maxSpeedRight).toFixed(1)} m/s clamped`

  controls.update()
  renderer.render(scene, camera)
})()

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
