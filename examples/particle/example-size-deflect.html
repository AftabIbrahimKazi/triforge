<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Size Deflect — st-particle-core</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }
    body { background: #111; overflow: hidden; font-family: monospace }
    canvas { display: block }
    #ui {
      position: fixed; top: 16px; left: 16px; color: #eee;
      display: flex; flex-direction: column; gap: 10px; width: 240px;
    }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 13px }
    input[type=range] { width: 200px }
    .val { color: #0f9 }
    .info { font-size: 11px; color: #888 }
  </style>
</head>
<body>
<div id="ui">
  <div style="font-size:14px;font-weight:bold;margin-bottom:4px">Size Deflect</div>
  <label>Particle Size: <span id="szVal" class="val">0.30</span>
    <input type="range" id="szSlider" min="0.05" max="1.2" step="0.01" value="0.3">
  </label>
  <div class="info">Larger particles bounce higher above the floor — they detect the surface at radius = size/2.</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

// ── Three.js setup ──────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setPixelRatio(devicePixelRatio)
renderer.setSize(innerWidth, innerHeight)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 200)
camera.position.set(0, 4, 12)
const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 2, 0)

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight)
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
})

// ── Floor plane ──────────────────────────────────────────────────────────────
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(12, 12),
  new THREE.MeshBasicMaterial({ color: 0x224422, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
)
floorMesh.rotation.x = -Math.PI / 2
scene.add(floorMesh)
scene.add(new THREE.GridHelper(12, 12, 0x336633, 0x224422))

// Floor normal is +Y, floor at y=0.
// Deflector: crossing test — particle radius = size/2, crossing fires at dPrev >= radius && dCurr < radius
// where d = position.y (since floor is at y=0 with normal (0,1,0))

// ── Particles ────────────────────────────────────────────────────────────────
const COUNT = 80

function lcg(seed) {
  let s = seed | 0
  return () => { s = (Math.imul(1664525, s) + 1013904223) | 0; return (s >>> 0) / 0xFFFFFFFF }
}
const rng = lcg(7)

const px = new Float32Array(COUNT)
const py = new Float32Array(COUNT)
const pz = new Float32Array(COUNT)
const vx = new Float32Array(COUNT)
const vy = new Float32Array(COUNT)
const vz = new Float32Array(COUNT)
const ages = new Float32Array(COUNT)

// Floor material at y=0, normal=(0,1,0)
const DAMPING = 0.0   // elastic

let particleSize = 0.30

function respawn(i) {
  px[i] = (rng() - 0.5) * 8
  py[i] = 4 + rng() * 3
  pz[i] = (rng() - 0.5) * 8
  vx[i] = (rng() - 0.5) * 1.5
  vy[i] = -(1 + rng() * 2)
  vz[i] = (rng() - 0.5) * 1.5
  ages[i] = 0
}

for (let i = 0; i < COUNT; i++) respawn(i)

// Sphere instances for visual size feedback
const sphereGeo = new THREE.SphereGeometry(0.5, 8, 6)
const sphereMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, wireframe: true })
const instanced = new THREE.InstancedMesh(sphereGeo, sphereMat, COUNT)
instanced.frustumCulled = false
scene.add(instanced)

// Horizontal line to show bounce height
const hLineGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-6, 0, 0), new THREE.Vector3(6, 0, 0)
])
const hLineMesh = new THREE.Line(hLineGeo, new THREE.LineBasicMaterial({ color: 0xff4444 }))
scene.add(hLineMesh)

// ── UI ──────────────────────────────────────────────────────────────────────
document.getElementById('szSlider').addEventListener('input', e => {
  particleSize = parseFloat(e.target.value)
  document.getElementById('szVal').textContent = particleSize.toFixed(2)
  // Update scale of sphere instances (each sphere has radius 0.5, so scale = size)
})

// ── Matrices ─────────────────────────────────────────────────────────────────
const _mat = new THREE.Matrix4()
const _pos = new THREE.Vector3()
const _s   = new THREE.Vector3()
const _q   = new THREE.Quaternion()

// ── Animation loop ────────────────────────────────────────────────────────────
const clock = new THREE.Clock()

function animate() {
  requestAnimationFrame(animate)
  const dt = Math.min(clock.getDelta(), 0.05)

  const radius = particleSize * 0.5

  for (let i = 0; i < COUNT; i++) {
    const prevY = py[i]

    vy[i] -= 9.81 * dt
    px[i] += vx[i] * dt
    py[i] += vy[i] * dt
    pz[i] += vz[i] * dt

    // Size Deflect: crossing fires at dPrev >= radius && dCurr < radius
    // d = py (signed distance from y=0 plane with normal +Y)
    if (prevY >= radius && py[i] < radius) {
      // Elastic reflection of normal component
      vy[i] = -vy[i] * (1 - DAMPING * 2)   // simplified elastic
      py[i] = radius                         // reposition to contact surface
    }

    // Respawn if fallen through (shouldn't happen, safety net)
    if (py[i] < -2 || ages[i] > 10) respawn(i)
    ages[i] += dt

    // Build instance matrix
    _pos.set(px[i], py[i], pz[i])
    _s.setScalar(particleSize)   // sphere geometry has radius=0.5, scale=size → visual diameter=size
    _mat.compose(_pos, _q, _s)
    instanced.setMatrixAt(i, _mat)
  }

  instanced.instanceMatrix.needsUpdate = true

  // Red line shows bounce height = radius
  hLineMesh.position.y = radius

  controls.update()
  renderer.render(scene, camera)
}
animate()
</script>
</body>
</html>
