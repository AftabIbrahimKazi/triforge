<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Particle Colour Modes — st-particle-core</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #eee; font-family: monospace; overflow: hidden; }
    #canvas { display: block; }
    #ui {
      position: fixed; top: 12px; left: 12px; background: rgba(0,0,0,.75);
      padding: 12px 16px; border-radius: 8px; min-width: 260px;
    }
    label { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 13px; }
    input[type=range] { width: 110px; }
    input[type=color]  { width: 40px; height: 22px; border: none; background: none; padding: 0; cursor: pointer; }
    span.val { min-width: 36px; text-align: right; }
    select { background: #222; color: #eee; border: 1px solid #444; padding: 2px; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <b>Particle Colour Modes</b><br><br>
  <label>Mode
    <select id="mode">
      <option value="0">Flat colour</option>
      <option value="1" selected>By velocity</option>
      <option value="2">By age</option>
    </select>
  </label>
  <label>Flat colour <input type="color" id="flatCol" value="#88aaff"></label>
  <label>Low colour  <input type="color" id="lowCol"  value="#ff2200"></label>
  <label>High colour <input type="color" id="highCol" value="#0088ff"></label>
  <label>velocityMax
    <input type="range" id="velMax" min="1" max="20" step="0.5" value="8">
    <span class="val" id="vVelMax">8.0</span>
  </label>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.156.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

// ── renderer / scene / camera ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true })
renderer.setPixelRatio(devicePixelRatio)
renderer.setSize(innerWidth, innerHeight)
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight)
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
})

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x080c10)

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100)
camera.position.set(0, 5, 12)
const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 3, 0)
controls.update()

scene.add(new THREE.GridHelper(20, 20, 0x223344, 0x1a2030))

// ── particle buffer ───────────────────────────────────────────────────────
const MAX    = 1500
const pPos   = new Float32Array(MAX * 3)
const pVel   = new Float32Array(MAX * 3)
const pAge   = new Float32Array(MAX)
const pLife  = new Float32Array(MAX)
const pAlive = new Uint8Array(MAX)
let   cursor = 0

// Pre-allocate geometry with per-vertex colour attribute
const pGeo     = new THREE.BufferGeometry()
const posAttr  = new THREE.BufferAttribute(new Float32Array(MAX * 3), 3).setUsage(THREE.DynamicDrawUsage)
const colAttr  = new THREE.BufferAttribute(new Float32Array(MAX * 3), 3).setUsage(THREE.DynamicDrawUsage)
pGeo.setAttribute('position', posAttr)
pGeo.setAttribute('color',    colAttr)
pGeo.setDrawRange(0, 0)

const pMat = new THREE.PointsMaterial({
  size: 0.18, transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true,
})
scene.add(new THREE.Points(pGeo, pMat))

// ── colour parameters ─────────────────────────────────────────────────────
let colourMode = 1
let flatR = 0.53, flatG = 0.67, flatB = 1.0
let lowR  = 1,    lowG  = 0.13, lowB  = 0
let highR = 0,    highG = 0.53, highB = 1
let velMax = 8

function hexToRGB(hex) {
  const n = parseInt(hex.slice(1), 16)
  return [(n>>16)/255, ((n>>8)&0xff)/255, (n&0xff)/255]
}

document.getElementById('mode').addEventListener('change', e => {
  colourMode = parseInt(e.target.value)
  pMat.vertexColors = colourMode > 0
  if (colourMode === 0) pMat.color.setRGB(flatR, flatG, flatB)
  pMat.needsUpdate = true
})

document.getElementById('flatCol').addEventListener('input', e => {
  const [r, g, b] = hexToRGB(e.target.value)
  flatR = r; flatG = g; flatB = b
})
document.getElementById('lowCol').addEventListener('input', e => {
  const [r, g, b] = hexToRGB(e.target.value); lowR = r; lowG = g; lowB = b
})
document.getElementById('highCol').addEventListener('input', e => {
  const [r, g, b] = hexToRGB(e.target.value); highR = r; highG = g; highB = b
})
document.getElementById('velMax').addEventListener('input', e => {
  velMax = parseFloat(e.target.value)
  document.getElementById('vVelMax').textContent = velMax.toFixed(1)
})

// ── emission (fountain from centre) ───────────────────────────────────────
let emitAccum = 0
const RATE = 200

function emit() {
  const i  = cursor % MAX
  cursor++
  const angle = Math.random() * Math.PI * 2
  const speed = 1.5 + Math.random() * 3.5
  pPos[i*3]   = 0
  pPos[i*3+1] = 0
  pPos[i*3+2] = 0
  pVel[i*3]   = Math.cos(angle) * speed * 0.6
  pVel[i*3+1] = 6 + Math.random() * 4
  pVel[i*3+2] = Math.sin(angle) * speed * 0.6
  pAge[i]     = 0
  pLife[i]    = 1.5 + Math.random() * 1.5
  pAlive[i]   = 1
}

// ── main loop ─────────────────────────────────────────────────────────────
let last = performance.now()

function lerp(a, b, t) { return a + (b - a) * t }

function animate() {
  requestAnimationFrame(animate)
  const now = performance.now()
  const dt  = Math.min((now - last) / 1000, 0.05)
  last = now

  emitAccum += RATE * dt
  const toEmit = Math.min(Math.floor(emitAccum), 15)
  emitAccum -= Math.floor(emitAccum)
  for (let i = 0; i < toEmit; i++) emit()

  let dc = 0
  for (let i = 0; i < MAX; i++) {
    if (!pAlive[i]) continue
    pAge[i] += dt
    if (pAge[i] >= pLife[i]) { pAlive[i] = 0; continue }

    pVel[i*3+1] -= 9.81 * dt * 0.6
    pPos[i*3]   += pVel[i*3]   * dt
    pPos[i*3+1] += pVel[i*3+1] * dt
    pPos[i*3+2] += pVel[i*3+2] * dt

    posAttr.array[dc*3]   = pPos[i*3]
    posAttr.array[dc*3+1] = pPos[i*3+1]
    posAttr.array[dc*3+2] = pPos[i*3+2]

    let r, g, b
    if (colourMode === 0) {
      r = flatR; g = flatG; b = flatB
    } else if (colourMode === 1) {
      const spd = Math.sqrt(pVel[i*3]**2 + pVel[i*3+1]**2 + pVel[i*3+2]**2)
      const t   = Math.min(1, spd / Math.max(velMax, 0.001))
      r = lerp(lowR, highR, t); g = lerp(lowG, highG, t); b = lerp(lowB, highB, t)
    } else {
      const t = pAge[i] / pLife[i]
      r = lerp(lowR, highR, t); g = lerp(lowG, highG, t); b = lerp(lowB, highB, t)
    }

    colAttr.array[dc*3]   = r
    colAttr.array[dc*3+1] = g
    colAttr.array[dc*3+2] = b
    dc++
  }

  posAttr.needsUpdate = true
  colAttr.needsUpdate = true
  pGeo.setDrawRange(0, dc)
  controls.update()
  renderer.render(scene, camera)
}

animate()
</script>
</body>
</html>
