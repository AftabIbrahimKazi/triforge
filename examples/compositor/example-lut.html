<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUT — @st-compositor-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }
  #info {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
  }
  #info h3 { color: #fff; font-size: 12px; margin-bottom: 4px; }
  #tabs {
    position: absolute; top: 12px; right: 14px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .tab {
    background: rgba(0,0,0,0.6); border: 1px solid #333;
    padding: 5px 14px; border-radius: 4px; cursor: pointer;
    color: #aaa; font: 11px monospace; text-align: center;
  }
  .tab.active { border-color: #4488ff; color: #88bbff; }
  #intensity-row {
    position: absolute; bottom: 14px; left: 14px;
    background: rgba(0,0,0,0.65); padding: 8px 14px; border-radius: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  input[type=range] { width: 160px; }
</style>
</head>
<body>
<div id="info">
  <h3>LUT — @st-compositor-core</h3>
  3-D Look-Up Table colour grading<br>
  Click a preset to see the grade
</div>
<div id="tabs"></div>
<div id="intensity-row">
  <span>intensity</span>
  <input type="range" id="intensitySlider" min="0" max="1" step="0.02" value="1">
  <span id="intensityVal">1.00</span>
</div>
<script type="importmap">
{
  "imports": {
    "three":               "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":       "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-compositor-core": "../../st-compositor-core/dist/index.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { CompositorOutput, LUT } from '@st-compositor-core'

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x111118)
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100)
camera.position.set(0, 2, 6)
const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 0.5, 0)

// ── Colourful scene ───────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.3))
const light = new THREE.DirectionalLight(0xfff0cc, 1.5)
light.position.set(4, 6, 3); scene.add(light)

const objects = [
  { geo: new THREE.SphereGeometry(0.6),           pos: [-2, 0.6, 0],  color: 0xe8402a },
  { geo: new THREE.BoxGeometry(1, 1, 1),           pos: [0, 0.5, 0],   color: 0x4488ff },
  { geo: new THREE.CylinderGeometry(0.4, 0.4, 1.2),pos: [2, 0.6, 0],  color: 0x44cc66 },
  { geo: new THREE.TorusGeometry(0.5, 0.2, 16, 48),pos: [0, 0.5, -2], color: 0xffaa22 },
]
for (const o of objects) {
  const m = new THREE.Mesh(o.geo, new THREE.MeshStandardMaterial({ color: o.color, roughness: 0.4, metalness: 0.2 }))
  m.position.set(...o.pos); scene.add(m)
}
scene.add(new THREE.GridHelper(10, 10, 0x222233, 0x111122))

// ── LUT pass ──────────────────────────────────────────────────────────────────
const lut = new LUT({ intensity: 1 })
const comp = new CompositorOutput({ renderer, scene, camera, width: innerWidth, height: innerHeight })
comp.add(lut)
await comp.compile()

// ── LUT presets (built procedurally) ─────────────────────────────────────────
const N = 32
const presets = [
  {
    name: 'Neutral',
    fn: (r, g, b) => [r, g, b],
  },
  {
    name: 'Warm\n(golden hour)',
    fn: (r, g, b) => [
      Math.min(1, r * 1.15 + b * 0.04),
      Math.min(1, g * 1.02),
      Math.max(0, b * 0.78),
    ],
  },
  {
    name: 'Cool\n(blue steel)',
    fn: (r, g, b) => [
      Math.max(0, r * 0.80),
      Math.min(1, g * 0.95 + b * 0.03),
      Math.min(1, b * 1.15 + r * 0.03),
    ],
  },
  {
    name: 'Bleach\n(low contrast)',
    fn: (r, g, b) => {
      const lum = r * 0.299 + g * 0.587 + b * 0.114
      return [
        r * 0.6 + lum * 0.4 + 0.05,
        g * 0.6 + lum * 0.4 + 0.05,
        b * 0.6 + lum * 0.4 + 0.05,
      ]
    },
  },
  {
    name: 'Cross\nprocess',
    fn: (r, g, b) => [
      Math.min(1, Math.pow(r, 0.7) * 1.1),
      Math.min(1, Math.pow(g, 1.1) * 0.95),
      Math.min(1, Math.pow(b, 0.85) + r * 0.08),
    ],
  },
]

const tabsEl = document.getElementById('tabs')
presets.forEach((p, i) => {
  const btn = document.createElement('div')
  btn.className = 'tab' + (i === 0 ? ' active' : '')
  btn.textContent = p.name
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i))
    const tex = LUT.createFromFn(THREE, N, p.fn)
    lut.setLUT(tex)
    lut.parameters.lutSize = N
  })
  tabsEl.appendChild(btn)
})

// Apply neutral LUT on load
lut.setLUT(LUT.createNeutral(THREE, N))

// Intensity slider
const slider = document.getElementById('intensitySlider')
const valEl  = document.getElementById('intensityVal')
slider.addEventListener('input', () => {
  lut.parameters.intensity = +slider.value
  lut.material?.uniforms?.['intensity'] && (lut.material.uniforms['intensity'].value = +slider.value)
  // Also update via pass uniforms
  valEl.textContent = (+slider.value).toFixed(2)
})

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime()
  scene.children.forEach(c => { if (c.isMesh) c.rotation.y = t * 0.3 })
  controls.update()
  comp.render()
})

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
