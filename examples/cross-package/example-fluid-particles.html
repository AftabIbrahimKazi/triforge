<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Particles Following Fluid — @st-fluid-core + @st-particle-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060810; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }
  #info {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
    max-width: 330px; line-height: 1.8;
  }
  #info h3 { color: #fff; font-size: 12px; margin-bottom: 4px; }
  .code { color: #7df; }
  #panel {
    position: absolute; bottom: 14px; left: 14px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
    display: flex; flex-direction: column; gap: 5px; min-width: 250px;
  }
  label { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  input[type=range] { width: 120px; }
</style>
</head>
<body>
<div id="info">
  <h3>Particles Following Fluid — Cross-Package</h3>
  <b>Blue</b> — FLIP fluid particles (FLIPSimulator)<br>
  <b>Orange</b> — tracer particles steered by fluid velocity<br><br>
  <span class="code">FlowFieldForce({ velocityFn })</span> reads the<br>
  live MAC grid velocity from <span class="code">FLIPSimulator.grid</span><br>
  — no cross-package import needed.
</div>
<div id="panel"></div>

<script type="importmap">
{
  "imports": {
    "three":              "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":      "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-fluid-core":     "../../st-fluid-core/dist/index.js",
    "@st-particle-core":  "../../st-particle-core/dist/index.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { FLIPSimulator }  from '@st-fluid-core'
import {
  ParticleSystem, PointEmitter, BillboardRenderer,
  FlowFieldForce, GravityForce,
} from '@st-particle-core'

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x060810)
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 30)
camera.position.set(0, 1.5, 5)
const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 0, 0)

scene.add(new THREE.AmbientLight(0xffffff, 0.5))
const sun = new THREE.DirectionalLight(0xffeedd, 1.5)
sun.position.set(3, 6, 4); scene.add(sun)
scene.add(new THREE.GridHelper(6, 6, 0x111122, 0x0a0a18))
scene.add(new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(2, 2, 2)),
  new THREE.LineBasicMaterial({ color: 0x223355, opacity: 0.35, transparent: true }),
))

// ── FLIP fluid sim ────────────────────────────────────────────────────────────
const fluid = new FLIPSimulator({
  resolution: 14, particleCount: 600,
  domainSize: 2, origin: [-1, -1, -1],
  substeps: 2, flipRatio: 0.95,
})
fluid.fillBox(-0.9, -0.9, -0.9, 0.1, 0.2, 0.9)

// Render fluid particles as blue points
const fluidGeo = new THREE.BufferGeometry()
fluidGeo.setAttribute('position', new THREE.BufferAttribute(fluid.getPositions(), 3))
const fluidPts = new THREE.Points(fluidGeo,
  new THREE.PointsMaterial({ color: 0x4488ff, size: 0.03, sizeAttenuation: true, opacity: 0.7, transparent: true }))
scene.add(fluidPts)

// ── Tracer particle system — follows fluid velocity ───────────────────────────
// FlowFieldForce.velocityFn reads from the live FLIP MAC grid
const flowForce = new FlowFieldForce({
  strength: 8,
  influence: 1,
  velocityFn: (x, y, z) => ({
    x: fluid.grid.interpU(x, y, z),
    y: fluid.grid.interpV(x, y, z),
    z: fluid.grid.interpW(x, y, z),
  }),
})

const tracerSys = new ParticleSystem({
  count: 300,
  lifetime: 4,
  lifetimeRandom: 0.5,
  startSize: 0.04,
  endSize: 0.01,
})

const emitter = new PointEmitter({
  position: [-0.5, 0.3, 0],
  spread: 0.3,
  velocity: [0.2, 0.5, 0],
})

const tracerRen = new BillboardRenderer({
  maxCount: 300,
  material: new THREE.SpriteMaterial({ color: 0xff8833, opacity: 0.8, transparent: true }),
})

tracerSys.addEmitter(emitter)
tracerSys.setRenderer(tracerRen)
tracerSys.addForce(flowForce)
tracerSys.addForce(new GravityForce({ strength: 2 }))
scene.add(tracerRen.object3D)

// ── Panel ─────────────────────────────────────────────────────────────────────
const panelEl = document.getElementById('panel')
const knobs = [
  { label: 'flow strength', key: 'strength', min: 0, max: 20, step: 0.5, def: 8,
    set: (v) => { flowForce.parameters.strength = v } },
  { label: 'flip ratio', key: 'flipRatio', min: 0, max: 1, step: 0.05, def: 0.95,
    set: (v) => { fluid.parameters.flipRatio = v } },
]
for (const k of knobs) {
  const row = document.createElement('label')
  const val = document.createElement('span')
  const inp = document.createElement('input')
  inp.type = 'range'; inp.min = k.min; inp.max = k.max; inp.step = k.step; inp.value = k.def
  val.textContent = (+inp.value).toFixed(2)
  inp.addEventListener('input', () => { k.set(+inp.value); val.textContent = (+inp.value).toFixed(2) })
  row.innerHTML = `<span>${k.label}</span>`
  row.appendChild(inp); row.appendChild(val)
  panelEl.appendChild(row)
}

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.033)

  // Step fluid
  fluid.step(dt)

  // Update fluid point cloud
  const pos = fluid.getPositions()
  const attr = fluidGeo.getAttribute('position')
  if (attr.array.length !== pos.length) {
    fluidGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3))
  } else {
    attr.array.set(pos); attr.needsUpdate = true
  }

  // Step tracer particles — FlowFieldForce reads live fluid.grid automatically
  tracerSys.update(dt)

  controls.update()
  renderer.render(scene, camera)
})

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
