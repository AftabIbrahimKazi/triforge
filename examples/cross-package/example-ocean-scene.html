<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ocean Scene — @st-modifier-core + @st-shader-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.35); font: 11px/1 monospace; letter-spacing: 0.08em;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="hud">DRAG TO ORBIT &nbsp;·&nbsp; SCROLL TO ZOOM</div>

<script type="importmap">
{
  "imports": {
    "three":             "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":     "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-modifier-core": "../../st-modifier-core/dist/index.js",
    "@st-shader-core":   "../../st-shader-core/dist/index.js"
  }
}
</script>

<script type="module">
import * as THREE        from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { ModifierStack, OceanModifier } from '@st-modifier-core';
import {
  OceanAttribute, AnimatedNoiseTexture, Bump,
  LayerWeight, MixRGB,
  ColorRamp, Emission,
  PrincipledBSDF, AddShader, MaterialOutput,
  Value,
} from '@st-shader-core';

// ═══════════════════════════════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE / CAMERA
// ═══════════════════════════════════════════════════════════════════════════════

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.5, 4000);
camera.position.set(0, 12, 55);
camera.lookAt(0, 2, -60);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minPolarAngle = 0.15;
controls.maxPolarAngle = Math.PI * 0.48;
controls.minDistance   = 8;
controls.maxDistance   = 300;

// Sun — low on horizon for dramatic backlit foam
const SUN_DIR      = new THREE.Vector3(0.45, 0.55, -0.70).normalize();
const SUN_COLOR    = new THREE.Vector3(1.00, 0.93, 0.78);
const AMBIENT_COLOR = new THREE.Vector3(0.04, 0.09, 0.22);

// ═══════════════════════════════════════════════════════════════════════════════
// SKY DOME  (raw ShaderMaterial — background only, not part of ocean shader)
// ═══════════════════════════════════════════════════════════════════════════════

const skyMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1800, 32, 16),
  new THREE.ShaderMaterial({
    side:       THREE.BackSide,
    depthWrite: false,
    uniforms:   { uSun: { value: SUN_DIR } },

    vertexShader: `
      varying vec3 vDir;
      void main() {
        vDir = normalize(position);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,

    fragmentShader: `
      uniform vec3 uSun;
      varying vec3 vDir;
      void main() {
        vec3 d  = normalize(vDir);
        float up = max(d.y, 0.0);

        // Sky gradient: zenith → mid → horizon
        vec3 col = mix(
          mix(vec3(0.02,0.06,0.18), vec3(0.05,0.15,0.38), smoothstep(0.6,0.0,up)),
          vec3(0.36,0.52,0.70),
          pow(1.0 - up, 5.0)
        );

        // Sun disc + scatter glow
        float sd      = dot(d, normalize(uSun));
        float disc    = smoothstep(0.9990, 0.9998, sd);
        float corona  = pow(max(sd, 0.0), 80.0) * 0.55;
        float scatter = pow(max(sd, 0.0), 7.0) * pow(1.0 - up, 4.0) * 0.85;

        col += vec3(0.95,0.60,0.20) * corona;
        col += vec3(0.85,0.45,0.15) * scatter;
        col  = mix(col, vec3(1.00,0.95,0.80), disc);

        // Below horizon darkens to ocean colour
        col = mix(col, vec3(0.01,0.04,0.10), smoothstep(0.0, 0.25, -d.y));

        gl_FragColor = vec4(col, 1.0);
      }
    `,
  })
);
scene.add(skyMesh);

// ═══════════════════════════════════════════════════════════════════════════════
// OCEAN MODIFIER  (@st-modifier-core)
//
// Matches Blender Ocean modifier:
//   Geometry=Generate, Resolution=30→80, Scale=3, Choppiness=1,
//   Wind=30 m/s, Depth=200 m, Foam coverage=0.2, Seed=55
// ═══════════════════════════════════════════════════════════════════════════════

const TILE = 80;   // world units per tile — 3×3 = 240×240 total

const oceanMod = new OceanModifier({
  resolution:   80,
  size:         TILE,
  scale:        3.0,
  choppiness:   1.0,
  windSpeed:    30.0,
  windAngle:    20.0,
  depth:        200.0,
  foamCoverage: 0.20,
  turbulence:   0.12,
  waveCount:    24,
  seed:         55,
});

const stack = new ModifierStack(new THREE.BufferGeometry());
stack.add(oceanMod);
let sharedGeo = stack.apply();

// ═══════════════════════════════════════════════════════════════════════════════
// OCEAN SHADER NODE GRAPH  (@st-shader-core)
//
//  AnimatedNoiseTexture(scale:10, speed:0.5)
//    └─ Fac ─→ Bump(strength:0.28) ─→ Normal ──────────────────────────────┐
//                                                                            │
//  LayerWeight(0.35)                                                         ↓
//    └─ Fresnel ─→ MixRGB(deepBlue, surfaceBlue) ─→ PrincipledBSDF(r:0.08) ─→ BSDF ─┐
//                                                                                      ├→ AddShader → MaterialOutput
//  OceanAttribute                                                                      │
//    └─ Fac ─→ ColorRamp(#000→#deeeff) ─→ Emission(strength:1.8) ─→ BSDF ────────────┘
//
// ═══════════════════════════════════════════════════════════════════════════════

// ── Micro-ripple detail normals ───────────────────────────────────────────────
// Animated noise gives fine surface ripples independent of macro wave geometry.
const microRipple  = new AnimatedNoiseTexture({ scale: 10.0, speed: 0.5, detail: 4.0 });
const rippleNormal = new Bump({
  height:   microRipple.output('Fac'),
  strength: new Value(0.28),
  distance: new Value(1.0),
});

// ── Fresnel water colour ──────────────────────────────────────────────────────
// Deep abyssal blue when looking straight down (Fresnel≈0).
// Lighter surface blue at grazing angles where sky is reflected (Fresnel≈1).
const layerWeight = new LayerWeight(0.35);
const waterColor  = new MixRGB({
  mode:   'MIX',
  fac:    layerWeight.output('Fresnel'),
  colorA: '#010e1c',   // deep water
  colorB: '#0c3c5e',   // surface / grazing reflection
});

// ── Principled BSDF ───────────────────────────────────────────────────────────
// Roughness 0.08 → very smooth, sharp specular (real water).
// IOR 1.33 → physical water IOR.
// Normal from micro-ripple Bump node.
const bsdf = new PrincipledBSDF({
  baseColor: waterColor.output('Color'),
  roughness: new Value(0.08),
  ior:       new Value(1.33),
  normal:    rippleNormal.output('Normal'),
});

// ── Foam: OceanAttribute → ColorRamp → Emission ──────────────────────────────
// Matches the Blender node graph exactly (Attribute node set to "Ocean").
// OceanAttribute reads the `foam` attribute written by OceanModifier.
const oceanAttr = new OceanAttribute();
const foamRamp  = new ColorRamp({
  fac:   oceanAttr.output('Fac'),
  stops: ['#000000', '#deeeff'],
});
const foamEmit = new Emission({
  color:    foamRamp.output('Color'),
  strength: new Value(1.8),
});

// ── Add Shader → Material Output ─────────────────────────────────────────────
const matOutput = new MaterialOutput({
  surface: new AddShader({
    shader1: bsdf.output('BSDF'),
    shader2: foamEmit.output('BSDF'),
  }).output('BSDF'),
});

matOutput.compile();
const oceanMat = matOutput.material;

// Inject scene lighting — ShaderMaterial is invisible to Three.js lights.
// uSunDirection, uSunColor, uAmbientColor are declared inside PrincipledBSDF.glslFunction.
oceanMat.uniforms.uSunDirection  = { value: SUN_DIR };
oceanMat.uniforms.uSunColor      = { value: SUN_COLOR };
oceanMat.uniforms.uAmbientColor  = { value: AMBIENT_COLOR };
// AnimatedNoiseTexture declares `uniform float time;` in its GLSL block.
oceanMat.uniforms.time           = { value: 0 };

// ═══════════════════════════════════════════════════════════════════════════════
// TILED OCEAN MESH  — 3×3 grid, all tiles share one geometry rebuilt each frame
// ═══════════════════════════════════════════════════════════════════════════════

const tiles = [];
for (let row = -1; row <= 1; row++) {
  for (let col = -1; col <= 1; col++) {
    const m = new THREE.Mesh(sharedGeo, oceanMat);
    m.position.set(col * TILE, 0, row * TILE);
    scene.add(m);
    tiles.push(m);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════════════════════

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════════════════════════════

const clock = new THREE.Clock();
let elapsed  = 0;

(function loop() {
  requestAnimationFrame(loop);

  const dt = clock.getDelta();
  elapsed += dt;

  // Advance OceanModifier time → rebuild geometry (CPU, once per frame shared across all tiles)
  oceanMod.parameters.time = elapsed;
  const prev = sharedGeo;
  sharedGeo  = stack.apply();
  for (const t of tiles) t.geometry = sharedGeo;
  prev.dispose();

  // AnimatedNoiseTexture time uniform
  oceanMat.uniforms.time.value = elapsed;

  // Sky dome follows camera so it never clips
  skyMesh.position.copy(camera.position);

  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
