<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLIP Fluid Simulation — @st-fluid-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050a12; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }
  #info {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
    max-width: 310px; line-height: 1.8;
  }
  #info h3 { color: #fff; font-size: 12px; margin-bottom: 4px; }
  .code { color: #7df; }
  #tabs {
    position: absolute; top: 12px; right: 14px;
    display: flex; gap: 6px;
  }
  .tab {
    background: rgba(0,0,0,0.6); border: 1px solid #333;
    padding: 5px 12px; border-radius: 4px; cursor: pointer;
    color: #aaa; font: 11px monospace;
  }
  .tab.active { border-color: #4488ff; color: #88bbff; }
  #panel {
    position: absolute; bottom: 14px; left: 14px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
    display: flex; flex-direction: column; gap: 5px; min-width: 250px;
  }
  label { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  input[type=range] { width: 120px; }
  #stats {
    position: absolute; bottom: 14px; right: 14px;
    background: rgba(0,0,0,0.65); padding: 8px 12px; border-radius: 4px;
    font: 11px monospace; color: #aaa; line-height: 1.8;
  }
</style>
</head>
<body>
<div id="info">
  <h3>FLIP Fluid Simulation</h3>
  Full incompressible FLIP solver:<br>
  P2G splat → gravity → pressure projection → G2P blend → advect<br><br>
  <span class="code">FLIPSimulator</span> — particle-based fluid<br>
  <span class="code">MarchingCubes</span> — surface mesh extraction<br>
  Pressure solved via <span class="code">conjugate-gradient</span>
</div>
<div id="tabs"></div>
<div id="panel"></div>
<div id="stats">particles: —<br>surface tris: —<br>ms/frame: —</div>

<script type="importmap">
{
  "imports": {
    "three":             "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":     "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-fluid-core":    "../../st-fluid-core/dist/index.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { FLIPSimulator, MarchingCubes } from '@st-fluid-core'

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x050a12)
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.01, 50)
camera.position.set(0, 1.2, 4)
const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 0, 0)

scene.add(new THREE.AmbientLight(0x8899bb, 0.6))
const sun = new THREE.DirectionalLight(0xffeedd, 1.8)
sun.position.set(3, 6, 4); scene.add(sun)
const fill = new THREE.DirectionalLight(0x4488ff, 0.5)
fill.position.set(-3, 2, -2); scene.add(fill)

// Domain box wireframe
const domainWire = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(2, 2, 2)),
  new THREE.LineBasicMaterial({ color: 0x223355, opacity: 0.5, transparent: true }),
)
scene.add(domainWire)

// ── Sim state ─────────────────────────────────────────────────────────────────
let sim = null
let mc  = null
let ptMesh    = null   // particle point cloud
let surfMesh  = null   // marching cubes surface
let showSurface = false

const statsEl = document.getElementById('stats')

function buildSim({ resolution, particleCount, flipRatio, renderMode }) {
  sim = new FLIPSimulator({
    resolution,
    particleCount,
    flipRatio,
    domainSize: 2,
    origin: [-1, -1, -1],
    substeps: 2,
    solverMaxIter: 60,
  })

  // Dam-break: fluid fills left half of domain
  sim.fillBox(-0.95, -0.95, -0.95, 0.05, 0.3, 0.95)

  mc = new MarchingCubes({ resolution: 28 })
  mc.setBounds([-1,-1,-1],[1,1,1])

  showSurface = renderMode === 'surface'
  rebuildRenderObjects()
}

function rebuildRenderObjects() {
  if (ptMesh)   { scene.remove(ptMesh);   ptMesh.geometry.dispose() }
  if (surfMesh) { scene.remove(surfMesh); surfMesh.geometry.dispose() }
  ptMesh = surfMesh = null

  if (!showSurface) {
    const geo = new THREE.BufferGeometry()
    geo.setAttribute('position', new THREE.BufferAttribute(sim.getPositions(), 3))
    ptMesh = new THREE.Points(geo, new THREE.PointsMaterial({
      color: 0x44aaff, size: 0.025, sizeAttenuation: true, transparent: true, opacity: 0.85,
    }))
    scene.add(ptMesh)
  } else {
    surfMesh = new THREE.Mesh(
      new THREE.BufferGeometry(),
      new THREE.MeshStandardMaterial({
        color: 0x4488cc, roughness: 0.1, metalness: 0.0,
        transparent: true, opacity: 0.82,
        side: THREE.DoubleSide,
      }),
    )
    scene.add(surfMesh)
  }
}

// ── Per-frame update ──────────────────────────────────────────────────────────
let frameStart = performance.now()

function updateFrame() {
  if (!sim) return
  const t0 = performance.now()

  sim.step(1 / 60)

  if (!showSurface) {
    // Update point cloud positions in-place
    const pos = sim.getPositions()
    const attr = ptMesh.geometry.getAttribute('position')
    if (attr.array.length !== pos.length) {
      ptMesh.geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3))
    } else {
      attr.array.set(pos)
      attr.needsUpdate = true
    }
    ptMesh.geometry.computeBoundingSphere()
  } else {
    // Build density field from particles and extract surface
    const positions = sim.getPositions()
    const h = 0.12

    mc.setField((wx, wy, wz) => {
      let density = 0
      for (let i = 0; i < positions.length; i += 3) {
        const dx = wx - positions[i], dy = wy - positions[i+1], dz = wz - positions[i+2]
        const r2 = dx*dx + dy*dy + dz*dz
        if (r2 < h*h) {
          const q = 1 - r2/(h*h)
          density += q * q * q
        }
      }
      return density
    })

    const geo = mc.extract()
    if (geo) {
      surfMesh.geometry.dispose()
      surfMesh.geometry = geo
    }
  }

  const ms = (performance.now() - t0).toFixed(1)
  const nTri = showSurface && surfMesh?.geometry?.index
    ? (surfMesh.geometry.index.count / 3).toFixed(0)
    : '—'
  statsEl.innerHTML = `particles: ${sim.liveCount}<br>surface tris: ${nTri}<br>ms/frame: ${ms}`
}

// ── Presets ───────────────────────────────────────────────────────────────────
const presets = [
  {
    name: 'Particles',
    knobs: [
      { label: 'resolution',  key: 'resolution',    min: 8,  max: 20, step: 2,    def: 14   },
      { label: 'particles',   key: 'particleCount', min: 200,max: 1500,step: 100, def: 800  },
      { label: 'FLIP ratio',  key: 'flipRatio',     min: 0,  max: 1,  step: 0.05, def: 0.95 },
    ],
    renderMode: 'points',
    fn: (v) => buildSim({ ...v, renderMode: 'points' }),
  },
  {
    name: 'Surface',
    knobs: [
      { label: 'resolution',  key: 'resolution',    min: 8,  max: 18, step: 2,    def: 12   },
      { label: 'particles',   key: 'particleCount', min: 200,max: 1000,step: 100, def: 500  },
      { label: 'FLIP ratio',  key: 'flipRatio',     min: 0,  max: 1,  step: 0.05, def: 0.95 },
    ],
    renderMode: 'surface',
    fn: (v) => buildSim({ ...v, renderMode: 'surface' }),
  },
  {
    name: 'Viscous',
    knobs: [
      { label: 'resolution',  key: 'resolution',    min: 8,  max: 18, step: 2,    def: 12  },
      { label: 'particles',   key: 'particleCount', min: 200,max: 800, step: 100, def: 500 },
      { label: 'FLIP ratio',  key: 'flipRatio',     min: 0,  max: 1,  step: 0.05, def: 0.1 },
    ],
    renderMode: 'points',
    fn: (v) => buildSim({ ...v, renderMode: 'points' }),
  },
]

const panelEl = document.getElementById('panel')
const tabsEl  = document.getElementById('tabs')

function activatePreset(idx) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === idx))
  const preset = presets[idx]
  const v = {}
  preset.knobs.forEach(k => { v[k.key] = k.def })

  panelEl.innerHTML = ''
  for (const k of preset.knobs) {
    const row = document.createElement('label')
    const val = document.createElement('span')
    const inp = document.createElement('input')
    inp.type = 'range'; inp.min = k.min; inp.max = k.max; inp.step = k.step; inp.value = k.def
    val.textContent = (+inp.value).toFixed(2)
    inp.addEventListener('input', () => {
      v[k.key] = +inp.value
      val.textContent = (+inp.value).toFixed(2)
      preset.fn(v)
    })
    row.innerHTML = `<span>${k.label}</span>`
    row.appendChild(inp); row.appendChild(val)
    panelEl.appendChild(row)
  }
  preset.fn(v)
}

presets.forEach((p, i) => {
  const btn = document.createElement('div')
  btn.className = 'tab'
  btn.textContent = p.name
  btn.addEventListener('click', () => activatePreset(i))
  tabsEl.appendChild(btn)
})
activatePreset(0)

// ── Render loop ───────────────────────────────────────────────────────────────
renderer.setAnimationLoop(() => {
  updateFrame()
  controls.update()
  renderer.render(scene, camera)
})

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
