<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>st-fluid-core — SPH fluid</title>
<style>
  body { margin:0; background:#000; overflow:hidden; font-family:monospace; }
  #info { position:absolute; top:10px; left:10px; color:#aaa; font-size:12px; line-height:1.8; pointer-events:none; }
  #controls { position:absolute; bottom:14px; left:14px; color:#ccc; font-size:12px; }
  label { display:inline-block; margin-right:18px; }
  input[type=range] { width:100px; vertical-align:middle; }
</style>
</head>
<body>
<div id="info">
  st-fluid-core — SPH Fluid Simulation<br>
  300 particles · drag to orbit · sliders adjust physics
</div>
<div id="controls">
  <label>Viscosity <input id="visc" type="range" min="0.01" max="2" step="0.01" value="0.1"></label>
  <label>Pressure K <input id="pk" type="range" min="50" max="800" step="10" value="200"></label>
  <label>Gravity <input id="grav" type="range" min="0" max="20" step="0.5" value="9.8"></label>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.156/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.156/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { SPHSimulator } from '../../st-fluid-core/dist/index.js'

// ── Scene ────────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
renderer.toneMapping = THREE.ACESFilmicToneMapping
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x020810)
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100)
camera.position.set(0, 1, 7)
const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true

scene.add(new THREE.AmbientLight(0x223355, 2))
const sun = new THREE.DirectionalLight(0x88ccff, 2)
sun.position.set(3, 8, 4)
scene.add(sun)

// Domain box (wireframe)
const boxWire = new THREE.Mesh(
  new THREE.BoxGeometry(4, 4, 4),
  new THREE.MeshBasicMaterial({ color: 0x334455, wireframe: true }),
)
scene.add(boxWire)

// ── SPH Simulator ─────────────────────────────────────────────────────────────
const sim = new SPHSimulator({ particleCount: 300, smoothingRadius: 0.35, substeps: 3 })
sim.setDomain([-2,-2,-2],[2,2,2])

// Drop particles from upper half
const initPos = new Float32Array(300 * 3)
for (let i = 0; i < 300; i++) {
  initPos[i*3]   = (Math.random()-0.5)*1.5
  initPos[i*3+1] = Math.random() * 1.5
  initPos[i*3+2] = (Math.random()-0.5)*1.5
}
sim.setPositions(initPos)

// Particle point cloud
const pGeo = sim.getGeometry()
const pMat = new THREE.PointsMaterial({
  color: 0x44aaff,
  size: 0.12,
  sizeAttenuation: true,
  transparent: true,
  opacity: 0.85,
})
const points = new THREE.Points(pGeo, pMat)
scene.add(points)

// Colour particles by density
const colAttr = new THREE.BufferAttribute(new Float32Array(300 * 3), 3)
pGeo.setAttribute('color', colAttr)
pMat.vertexColors = true

// UI
document.getElementById('visc').addEventListener('input', e => { sim.parameters.viscosity = +e.target.value })
document.getElementById('pk').addEventListener('input', e => { sim.parameters.pressureK = +e.target.value })
document.getElementById('grav').addEventListener('input', e => { sim.parameters.gravityY = -+e.target.value })

const clock = new THREE.Clock()
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

;(function animate() {
  requestAnimationFrame(animate)
  const dt = Math.min(clock.getDelta(), 0.04)
  sim.step(dt)
  sim.updateGeometry(pGeo)

  // Colour by density
  for (let i = 0; i < 300; i++) {
    const d = Math.min(sim.getDensity(i) / (sim.parameters.restDensity * 1.5), 1)
    colAttr.setXYZ(i, d * 0.2, d * 0.6, 1.0)
  }
  colAttr.needsUpdate = true

  controls.update()
  renderer.render(scene, camera)
})()
</script>
</body>
</html>
