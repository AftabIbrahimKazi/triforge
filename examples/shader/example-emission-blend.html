<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emission, MixShader, AddShader, ShaderToRGB, Fresnel — @st-shader-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080808; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }
  #info {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 4px;
  }
  #labels { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .label { position: absolute; transform: translateX(-50%); background: rgba(0,0,0,0.6);
    padding: 2px 7px; border-radius: 3px; font: 10px monospace; color: #eee; white-space: nowrap; }
</style>
</head>
<body>
<div id="info">Emission · MixShader · AddShader · ShaderToRGB · Fresnel — @st-shader-core</div>
<div id="labels"></div>
<script type="importmap">
{
  "imports": {
    "three":           "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":   "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-shader-core": "../../st-shader-core/dist/index.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import {
  MaterialOutput, PrincipledBSDF, DiffuseBSDF,
  Emission, MixShader, AddShader, ShaderToRGB,
  Fresnel, ColorRamp, RGB, Value, NoiseTexture
} from '@st-shader-core'

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x080808)
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100)
camera.position.set(0, 1.5, 12)
const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 0, 0)

scene.add(new THREE.AmbientLight(0xffffff, 0.3))
const sun = new THREE.DirectionalLight(0xffffff, 2)
sun.position.set(5, 8, 4)
scene.add(sun)

const defs = [
  {
    name: 'Emission',
    build: () => {
      const emit = new Emission({ color: new RGB('#ff6600'), strength: 2.0 })
      const mat  = new MaterialOutput({ surface: emit.output('BSDF') })
      mat.compile(); return mat.material
    }
  },
  {
    name: 'MixShader\n(Diffuse+Emission)',
    build: () => {
      const diff = new DiffuseBSDF()
      const emit = new Emission({ color: new RGB('#0066ff'), strength: 3.0 })
      const mix  = new MixShader({ fac: new Value(0.4), shader1: diff.output('BSDF'), shader2: emit.output('BSDF') })
      const mat  = new MaterialOutput({ surface: mix.output('BSDF') })
      mat.compile(); return mat.material
    }
  },
  {
    name: 'AddShader\n(Diffuse+Emission)',
    build: () => {
      const diff = new DiffuseBSDF({ color: new RGB('#222222') })
      const emit = new Emission({ color: new RGB('#00ff88'), strength: 1.5 })
      const add  = new AddShader({ shader1: diff.output('BSDF'), shader2: emit.output('BSDF') })
      const mat  = new MaterialOutput({ surface: add.output('BSDF') })
      mat.compile(); return mat.material
    }
  },
  {
    name: 'ShaderToRGB\n→ ColorRamp',
    build: () => {
      const diff = new DiffuseBSDF()
      const s2r  = new ShaderToRGB({ shader: diff.output('BSDF') })
      const ramp = new ColorRamp({ fac: s2r.output('Alpha'), stops: ['#001144', '#00ccff', '#ffffff'] })
      const emit = new Emission({ color: ramp.output('Color'), strength: 1.5 })
      const mat  = new MaterialOutput({ surface: emit.output('BSDF') })
      mat.compile(); return mat.material
    }
  },
  {
    name: 'Fresnel\n→ MixShader',
    build: () => {
      const fres  = new Fresnel({ ior: 1.45 })
      const diff  = new DiffuseBSDF({ color: new RGB('#1a1a2e') })
      const emit  = new Emission({ color: new RGB('#4488ff'), strength: 4.0 })
      const mix   = new MixShader({ fac: fres.output('Fac'), shader1: diff.output('BSDF'), shader2: emit.output('BSDF') })
      const mat   = new MaterialOutput({ surface: mix.output('BSDF') })
      mat.compile(); return mat.material
    }
  }
]

const geo    = new THREE.SphereGeometry(0.9, 48, 32)
const span   = (defs.length - 1) * 2.4
const labels = document.getElementById('labels')

const spheres = defs.map((def, i) => {
  const mat  = def.build()
  const mesh = new THREE.Mesh(geo, mat)
  mesh.position.x = -span / 2 + i * 2.4
  scene.add(mesh)

  const lbl = document.createElement('div')
  lbl.className = 'label'
  lbl.textContent = def.name
  labels.appendChild(lbl)

  return { mesh, lbl }
})

function projectLabel(mesh, lbl) {
  const v = mesh.position.clone().project(camera)
  lbl.style.left = ((v.x * 0.5 + 0.5) * innerWidth) + 'px'
  lbl.style.top  = ((-v.y * 0.5 + 0.5) * innerHeight + 78) + 'px'
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

;(function animate() {
  requestAnimationFrame(animate)
  controls.update()
  spheres.forEach(({ mesh, lbl }) => projectLabel(mesh, lbl))
  renderer.render(scene, camera)
})()
</script>
</body>
</html>
