<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Nodes — @st-shader-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }
  #info { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 4px; }
  #labels { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .label { position: absolute; transform: translateX(-50%); background: rgba(0,0,0,0.6);
    padding: 2px 7px; border-radius: 3px; font: 10px monospace; color: #eee; white-space: nowrap; }
</style>
</head>
<body>
<div id="info">Color Nodes — @st-shader-core<br>MixRGB · HueSaturationValue · InvertColor · BrightContrast · Gamma · RGBtoBW</div>
<div id="labels"></div>
<script type="importmap">
{
  "imports": {
    "three":           "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":   "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-shader-core": "../../st-shader-core/dist/index.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import {
  MaterialOutput, PrincipledBSDF, Emission,
  NoiseTexture, ColorRamp,
  MixRGB, HueSaturationValue, InvertColor, BrightContrast, Gamma, RGBtoBW,
  RGB, Value
} from '@st-shader-core'

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x0d0d0d)
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100)
camera.position.set(0, 1.5, 14)
const controls = new OrbitControls(camera, renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff, 0.4))
const sun = new THREE.DirectionalLight(0xffffff, 2)
sun.position.set(5, 8, 4)
scene.add(sun)

// Base noise used as input across all demos
function baseRamp() {
  const n = new NoiseTexture({ scale: 3.0 })
  return new ColorRamp({ fac: n.output('Fac'), stops: ['#cc2200', '#ffaa00', '#ffeecc'] })
}

const defs = [
  {
    name: 'Source\n(no node)',
    build: () => {
      const bsdf = new PrincipledBSDF({ baseColor: baseRamp().output('Color'), roughness: 0.5 })
      const mat  = new MaterialOutput({ surface: bsdf.output('BSDF') })
      mat.compile(); return mat.material
    }
  },
  {
    name: 'MixRGB\n(MULTIPLY)',
    build: () => {
      const mix  = new MixRGB({ mode: 'MULTIPLY', fac: new Value(0.8),
        colorA: baseRamp().output('Color'), colorB: new RGB('#0044ff') })
      const bsdf = new PrincipledBSDF({ baseColor: mix.output('Color'), roughness: 0.5 })
      const mat  = new MaterialOutput({ surface: bsdf.output('BSDF') })
      mat.compile(); return mat.material
    }
  },
  {
    name: 'HueSaturationValue',
    build: () => {
      const hsv  = new HueSaturationValue({ hue: 0.6, saturation: 1.5, value: 1.2, color: baseRamp().output('Color') })
      const bsdf = new PrincipledBSDF({ baseColor: hsv.output('Color'), roughness: 0.5 })
      const mat  = new MaterialOutput({ surface: bsdf.output('BSDF') })
      mat.compile(); return mat.material
    }
  },
  {
    name: 'InvertColor',
    build: () => {
      const inv  = new InvertColor({ color: baseRamp().output('Color'), fac: new Value(1.0) })
      const bsdf = new PrincipledBSDF({ baseColor: inv.output('Color'), roughness: 0.5 })
      const mat  = new MaterialOutput({ surface: bsdf.output('BSDF') })
      mat.compile(); return mat.material
    }
  },
  {
    name: 'BrightContrast',
    build: () => {
      const bc   = new BrightContrast({ color: baseRamp().output('Color'), bright: 0.3, contrast: 1.5 })
      const bsdf = new PrincipledBSDF({ baseColor: bc.output('Color'), roughness: 0.5 })
      const mat  = new MaterialOutput({ surface: bsdf.output('BSDF') })
      mat.compile(); return mat.material
    }
  },
  {
    name: 'Gamma',
    build: () => {
      const g    = new Gamma({ color: baseRamp().output('Color'), gamma: 2.2 })
      const bsdf = new PrincipledBSDF({ baseColor: g.output('Color'), roughness: 0.5 })
      const mat  = new MaterialOutput({ surface: bsdf.output('BSDF') })
      mat.compile(); return mat.material
    }
  },
  {
    name: 'RGBtoBW',
    build: () => {
      const bw   = new RGBtoBW({ color: baseRamp().output('Color') })
      const ramp = new ColorRamp({ fac: bw.output('Val'), stops: ['#000000', '#ffffff'] })
      const bsdf = new PrincipledBSDF({ baseColor: ramp.output('Color'), roughness: 0.5 })
      const mat  = new MaterialOutput({ surface: bsdf.output('BSDF') })
      mat.compile(); return mat.material
    }
  }
]

const geo    = new THREE.SphereGeometry(0.9, 48, 32)
const span   = (defs.length - 1) * 2.4
const labels = document.getElementById('labels')

const spheres = defs.map((def, i) => {
  const mat  = def.build()
  const mesh = new THREE.Mesh(geo, mat)
  mesh.position.x = -span / 2 + i * 2.4
  scene.add(mesh)
  const lbl = document.createElement('div')
  lbl.className = 'label'
  lbl.textContent = def.name
  labels.appendChild(lbl)
  return { mesh, lbl }
})

function projectLabel(mesh, lbl) {
  const v = mesh.position.clone().project(camera)
  lbl.style.left = ((v.x * 0.5 + 0.5) * innerWidth) + 'px'
  lbl.style.top  = ((-v.y * 0.5 + 0.5) * innerHeight + 78) + 'px'
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

;(function animate() {
  requestAnimationFrame(animate)
  controls.update()
  spheres.forEach(({ mesh, lbl }) => projectLabel(mesh, lbl))
  renderer.render(scene, camera)
})()
</script>
</body>
</html>
