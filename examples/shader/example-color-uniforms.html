<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>st-shader-core — Live Color Uniforms</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: monospace; overflow: hidden; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 16px; left: 16px; width: 260px;
    background: rgba(0,0,0,0.75); border: 1px solid #333; border-radius: 8px;
    padding: 14px; display: flex; flex-direction: column; gap: 10px;
    font-size: 13px;
  }
  h2 { font-size: 13px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 2px; }
  label { display: flex; justify-content: space-between; align-items: center; }
  input[type=color] { width: 48px; height: 22px; border: none; cursor: pointer; background: none; }
  input[type=range] { width: 120px; accent-color: #7af; }
  .row { display: flex; gap: 8px; align-items: center; }
  button {
    flex: 1; padding: 5px 0; background: #2a2a2a; border: 1px solid #444;
    color: #eee; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px;
  }
  button:hover { background: #3a3a3a; }
  #info { font-size: 11px; color: #888; line-height: 1.5; }
</style>
</head>
<body>
<div id="ui">
  <h2>Live Color Uniforms</h2>

  <label>Base Color
    <input type="color" id="baseColor" value="#4488ff">
  </label>
  <label>Emission Color
    <input type="color" id="emColor" value="#ff4400">
  </label>
  <label>Emission Strength
    <input type="range" id="emStr" min="0" max="5" step="0.05" value="1.5">
    <span id="emStrVal">1.50</span>
  </label>
  <label>Roughness
    <input type="range" id="rough" min="0" max="1" step="0.01" value="0.3">
    <span id="roughVal">0.30</span>
  </label>
  <label>Metallic
    <input type="range" id="metal" min="0" max="1" step="0.01" value="0.0">
    <span id="metalVal">0.00</span>
  </label>
  <label>Mix (BSDF ↔ Emission)
    <input type="range" id="mix" min="0" max="1" step="0.01" value="0.0">
    <span id="mixVal">0.00</span>
  </label>

  <div class="row">
    <button id="animBtn">Animate Colors</button>
    <button id="stopBtn">Stop</button>
  </div>

  <div id="info">
    Colors are <b>live uniform vec3</b>.<br>
    No recompile — instant GPU update.<br>
    Set: <code>bsdf.parameters.baseColor = [r,g,b]</code>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/",
    "@st-shader-core": "../../st-shader-core/dist/index.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import {
  ShaderConfig,
  NoiseTexture, PrincipledBSDF, Emission, MixShader, MaterialOutput, ShaderMath, Value
} from '@st-shader-core'

ShaderConfig.errorLevel = 'verbose'

// ── Scene setup ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x0d0d14)

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100)
camera.position.set(0, 1, 4)
const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true

// ── Build material — colors as live uniforms ──────────────────────────────────
// PrincipledBSDF with baseColor as live uniform vec3
const bsdf = new PrincipledBSDF({ baseColor: '#4488ff', roughness: 0.3, metallic: 0.0 })

// Emission node — emColor is also a live uniform vec3
const emNode = new Emission({ color: '#ff4400', strength: 1.5 })

// MixShader blends BSDF and Emission — fac controlled by uniform
const mix    = new MixShader({ fac: 0.0, shader1: bsdf.output('BSDF'), shader2: emNode.output('BSDF') })

const mat    = new MaterialOutput({ surface: mix.output('BSDF') })
mat.compile()

console.log('Color uniforms in material:', Object.keys(mat.material.uniforms).filter(k => {
  const v = mat.material.uniforms[k].value
  return Array.isArray(v)
}))

// ── Meshes ────────────────────────────────────────────────────────────────────
const geos = [
  new THREE.SphereGeometry(0.6, 64, 32),
  new THREE.TorusGeometry(0.5, 0.2, 32, 64),
  new THREE.IcosahedronGeometry(0.55, 2),
]
const positions = [-1.6, 0, 1.6]

const meshes = geos.map((g, i) => {
  const m = new THREE.Mesh(g, mat.material)
  m.position.x = positions[i]
  scene.add(m)
  return m
})

// ── UI helpers ────────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const h = hex.replace('#', '')
  return [
    parseInt(h.slice(0, 2), 16) / 255,
    parseInt(h.slice(2, 4), 16) / 255,
    parseInt(h.slice(4, 6), 16) / 255,
  ]
}

document.getElementById('baseColor').addEventListener('input', e => {
  bsdf.parameters.baseColor = hexToRgb(e.target.value)
})
document.getElementById('emColor').addEventListener('input', e => {
  emNode.parameters.color = hexToRgb(e.target.value)
})
document.getElementById('emStr').addEventListener('input', e => {
  const v = parseFloat(e.target.value)
  emNode.parameters.strength = v
  document.getElementById('emStrVal').textContent = v.toFixed(2)
})
document.getElementById('rough').addEventListener('input', e => {
  const v = parseFloat(e.target.value)
  bsdf.parameters.roughness = v
  document.getElementById('roughVal').textContent = v.toFixed(2)
})
document.getElementById('metal').addEventListener('input', e => {
  const v = parseFloat(e.target.value)
  bsdf.parameters.metallic = v
  document.getElementById('metalVal').textContent = v.toFixed(2)
})
document.getElementById('mix').addEventListener('input', e => {
  const v = parseFloat(e.target.value)
  mix.parameters.fac = v
  document.getElementById('mixVal').textContent = v.toFixed(2)
})

// ── Color animation ───────────────────────────────────────────────────────────
let animId = null
let animStart = 0

function animateColors(t) {
  const elapsed = (t - animStart) / 1000
  const r = Math.sin(elapsed * 0.7) * 0.5 + 0.5
  const g = Math.sin(elapsed * 1.1 + 2) * 0.5 + 0.5
  const b = Math.sin(elapsed * 0.9 + 4) * 0.5 + 0.5
  bsdf.parameters.baseColor = [r, g, b]

  const er = Math.sin(elapsed * 1.3 + 1) * 0.5 + 0.5
  const eg = Math.sin(elapsed * 0.8 + 3) * 0.5 + 0.5
  emNode.parameters.color = [er, eg, 1.0 - er]

  mix.parameters.fac = Math.sin(elapsed * 0.5) * 0.5 + 0.5

  animId = requestAnimationFrame(animateColors)
}

document.getElementById('animBtn').addEventListener('click', () => {
  if (!animId) {
    animStart = performance.now()
    animId = requestAnimationFrame(animateColors)
  }
})
document.getElementById('stopBtn').addEventListener('click', () => {
  if (animId) { cancelAnimationFrame(animId); animId = null }
})

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
function animate() {
  requestAnimationFrame(animate)
  controls.update()
  meshes.forEach((m, i) => {
    m.rotation.y += 0.004 * (i % 2 === 0 ? 1 : -1)
    m.rotation.x += 0.002
  })
  renderer.render(scene, camera)
}
animate()

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
