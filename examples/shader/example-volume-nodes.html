<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volume Shader Nodes — @st-shader-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080c10; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }
  #info {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.7); padding: 10px 14px; border-radius: 4px;
    max-width: 300px; line-height: 1.8;
  }
  #info h3 { color: #fff; font-size: 12px; margin-bottom: 4px; }
  .code { color: #7df; }
  #tabs {
    position: absolute; top: 12px; right: 14px;
    display: flex; gap: 6px;
  }
  .tab {
    background: rgba(0,0,0,0.6); border: 1px solid #333;
    padding: 5px 12px; border-radius: 4px; cursor: pointer;
    color: #aaa; font: 11px monospace;
  }
  .tab.active { border-color: #4488ff; color: #88bbff; }
</style>
</head>
<body>
<div id="info">
  <h3>Volume Shader Nodes — @st-shader-core</h3>
  These nodes output to <span class="code">MaterialOutput.volume</span><br><br>
  <b>VolumeAbsorption</b> — absorb light<br>
  <b>VolumeScatter</b> — scatter + HG phase<br>
  <b>PrincipledVolume</b> — scatter + absorb + emit
</div>
<div id="tabs">
  <div class="tab active" onclick="setPreset(0)">VolumeAbsorption</div>
  <div class="tab"        onclick="setPreset(1)">VolumeScatter</div>
  <div class="tab"        onclick="setPreset(2)">PrincipledVolume</div>
</div>
<script type="importmap">
{
  "imports": {
    "three":           "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":   "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-shader-core": "../../st-shader-core/dist/index.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import {
  MaterialOutput,
  PrincipledBSDF, Emission, AddShader,
  VolumeAbsorption, VolumeScatter, PrincipledVolume,
  NoiseTexture, ColorRamp,
  ShaderConfig
} from '@st-shader-core'

ShaderConfig.errorLevel = 'verbose'

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x080c10)
scene.add(new THREE.AmbientLight(0xffffff, 0.5))
const sun = new THREE.DirectionalLight(0xfff8e8, 2)
sun.position.set(4, 6, 3); scene.add(sun)

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100)
camera.position.set(0, 1, 6)
const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 0, 0)

scene.add(new THREE.GridHelper(10, 10, 0x111122, 0x0a0a18))

// Build a sphere mesh — volume nodes tint the material colour
const geo = new THREE.SphereGeometry(1.2, 32, 32)
const mesh = new THREE.Mesh(geo)
scene.add(mesh)

const presets = [
  {
    name: 'VolumeAbsorption',
    make: () => {
      // Surface: simple diffuse
      const bsdf   = new PrincipledBSDF({ baseColor: '#88bbff', roughness: 0.5 })
      // Volume: deep blue absorption
      const vol    = new VolumeAbsorption({ color: '#0033aa', density: 2.0 })
      const mat    = new MaterialOutput({ surface: bsdf.output('BSDF'), volume: vol.output('Volume') })
      mat.compile()
      return mat.material
    },
  },
  {
    name: 'VolumeScatter',
    make: () => {
      const bsdf   = new PrincipledBSDF({ baseColor: '#cceecc', roughness: 0.4 })
      const vol    = new VolumeScatter({ color: '#44ff88', density: 1.5, anisotropy: 0.3 })
      const mat    = new MaterialOutput({ surface: bsdf.output('BSDF'), volume: vol.output('Volume') })
      mat.compile()
      return mat.material
    },
  },
  {
    name: 'PrincipledVolume',
    make: () => {
      const bsdf   = new PrincipledBSDF({ baseColor: '#222222', roughness: 0.8, metallic: 0 })
      const vol    = new PrincipledVolume({
        color: '#ff6622', density: 1.2, anisotropy: 0.2,
        absorptionColor: '#220000',
        emissionColor: '#ff4400', emissionStrength: 1.5,
        blackbodyIntensity: 0.8, temperature: 2200,
      })
      const mat    = new MaterialOutput({ surface: bsdf.output('BSDF'), volume: vol.output('Volume') })
      mat.compile()
      return mat.material
    },
  },
]

window.setPreset = (i) => {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i))
  mesh.material = presets[i].make()
}
setPreset(0)

const clock = new THREE.Clock()
renderer.setAnimationLoop(() => {
  mesh.rotation.y = clock.getElapsedTime() * 0.3
  controls.update()
  renderer.render(scene, camera)
})

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
