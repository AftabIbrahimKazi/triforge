<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rigid Body Constraints — @st-physics-core</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050810; overflow: hidden; font: 11px/1.6 monospace; color: #ccc; }
  canvas { display: block; }
  #info {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
    max-width: 290px; line-height: 1.8;
  }
  #info h3 { color: #fff; font-size: 12px; margin-bottom: 4px; }
  .code { color: #7df; }
  #tabs {
    position: absolute; top: 12px; right: 14px;
    display: flex; gap: 6px; flex-wrap: wrap; max-width: 280px; justify-content: flex-end;
  }
  .tab {
    background: rgba(0,0,0,0.6); border: 1px solid #333;
    padding: 5px 12px; border-radius: 4px; cursor: pointer;
    color: #aaa; font: 11px monospace;
  }
  .tab.active { border-color: #4488ff; color: #88bbff; }
  #panel {
    position: absolute; bottom: 14px; left: 14px;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 4px;
    display: flex; flex-direction: column; gap: 5px; min-width: 240px;
  }
  label { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  input[type=range] { width: 120px; }
</style>
</head>
<body>
<div id="info">
  <h3>Rigid Body Constraints</h3>
  <b>Fixed</b> — lock two bodies together<br>
  <b>Hinge</b> — rotate around a pivot<br>
  <b>Slider</b> — translate along an axis<br>
  <b>Spring</b> — elastic spring force<br><br>
  Click a tab to switch demo.<br>
  <span class="code">world.addConstraint(c)</span>
</div>
<div id="tabs"></div>
<div id="panel"></div>
<script type="importmap">
{
  "imports": {
    "three":           "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":   "https://unpkg.com/three@0.165.0/examples/jsm/",
    "@st-physics-core":"../../st-physics-core/dist/index.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { RigidBodyWorld, RigidBody, FixedConstraint, HingeConstraint, SliderConstraint, SpringConstraint } from '@st-physics-core'

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x050810)
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100)
camera.position.set(0, 4, 12)
const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 1, 0)

scene.add(new THREE.AmbientLight(0xffffff, 0.4))
const sun = new THREE.DirectionalLight(0xfff0cc, 1.5)
sun.position.set(4, 8, 3); scene.add(sun)
scene.add(new THREE.GridHelper(12, 12, 0x111133, 0x0a0a20))

let world = null
const bodyMeshes = new Map()

function clearSim() {
  bodyMeshes.forEach((m) => { scene.remove(m); m.geometry.dispose() })
  bodyMeshes.clear()
  world = null
}

function makeWorld() {
  world = new RigidBodyWorld({ gravity: [0, -9.8, 0], substeps: 4 })
  return world
}

function addBodyMesh(body, color = 0x4488ff, shape = 'sphere') {
  let geo
  if (shape === 'sphere') geo = new THREE.SphereGeometry(body.parameters.sizeX, 16, 16)
  else geo = new THREE.BoxGeometry(body.parameters.sizeX*2, body.parameters.sizeY*2, body.parameters.sizeZ*2)
  const mat  = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.2 })
  const mesh = new THREE.Mesh(geo, mat)
  scene.add(mesh); bodyMeshes.set(body, mesh)
  return mesh
}

function syncMeshes() {
  bodyMeshes.forEach((mesh, body) => {
    mesh.position.copy(body.position)
    mesh.quaternion.copy(body.orientation)
  })
}

// ── Demos ─────────────────────────────────────────────────────────────────────

function demoFixed(stiffness = 0.8) {
  clearSim(); makeWorld()

  const anchor = new RigidBody({ shape: 'sphere', size: 0.3, mass: 0, position: [0, 3, 0] })
  const box    = new RigidBody({ shape: 'box', size: [0.4, 0.4, 0.4], mass: 1, position: [1, 3, 0] })
  world.addBody(anchor); world.addBody(box)

  const c = new FixedConstraint(anchor, box, { stiffness, damping: 0.1 })
  world.addConstraint(c)

  // Kick it
  box.velocity.set(0, 5, 2)

  addBodyMesh(anchor, 0xff4444, 'sphere')
  addBodyMesh(box,    0x4488ff, 'box')
  return c
}

function demoHinge(stiffness = 0.8) {
  clearSim(); makeWorld()

  const pivot = new RigidBody({ shape: 'sphere', size: 0.2, mass: 0, position: [0, 3, 0] })
  const arm   = new RigidBody({ shape: 'box', size: [1, 0.15, 0.15], mass: 1, position: [1.2, 3, 0] })
  world.addBody(pivot); world.addBody(arm)

  const c = new HingeConstraint(pivot, arm, [0, 3, 0], { stiffness, damping: 0.05 })
  world.addConstraint(c)

  arm.velocity.set(0, 3, 2)
  addBodyMesh(pivot, 0xff6600, 'sphere')
  addBodyMesh(arm,   0x44aaff, 'box')
  return c
}

function demoSlider(stiffness = 0.8, useLimits = false) {
  clearSim(); makeWorld()

  const anchor = new RigidBody({ shape: 'sphere', size: 0.25, mass: 0, position: [-2, 2, 0] })
  const slider = new RigidBody({ shape: 'box', size: [0.35, 0.35, 0.35], mass: 1, position: [2, 2, 0] })
  world.addBody(anchor); world.addBody(slider)

  const c = new SliderConstraint(anchor, slider, [1, 0, 0], {
    stiffness, damping: 0.1,
    useLimits, limitMin: -2, limitMax: 2,
  })
  world.addConstraint(c)
  slider.velocity.set(0, 3, 1)

  addBodyMesh(anchor, 0xff4488, 'sphere')
  addBodyMesh(slider, 0x88ff44, 'box')
  return c
}

function demoSpring(restLength = 2, stiffness = 8) {
  clearSim(); makeWorld()

  // Chain of 5 spheres connected by springs
  const bodies = []
  for (let i = 0; i < 5; i++) {
    const b = new RigidBody({
      shape: 'sphere', size: 0.25, mass: i === 0 ? 0 : 1,
      position: [i * 1.0 - 2, 3, 0],
    })
    world.addBody(b)
    bodies.push(b)
    addBodyMesh(b, [0xff4444, 0xff8844, 0xffcc44, 0x44ffcc, 0x4488ff][i], 'sphere')
  }
  for (let i = 0; i < bodies.length - 1; i++) {
    const c = new SpringConstraint(bodies[i], bodies[i+1], { restLength, stiffness, damping: 0.3 })
    world.addConstraint(c)
  }
  bodies[4].velocity.set(0, 5, 3)
}

// ── Preset system ─────────────────────────────────────────────────────────────
const presets = [
  {
    name: 'Fixed',
    knobs: [
      { label: 'stiffness', key: 'stiffness', min: 0.1, max: 1, step: 0.05, def: 0.8 },
    ],
    fn: (v) => demoFixed(v.stiffness ?? 0.8),
  },
  {
    name: 'Hinge',
    knobs: [
      { label: 'stiffness', key: 'stiffness', min: 0.1, max: 1, step: 0.05, def: 0.8 },
    ],
    fn: (v) => demoHinge(v.stiffness ?? 0.8),
  },
  {
    name: 'Slider',
    knobs: [
      { label: 'stiffness',  key: 'stiffness',  min: 0.1, max: 1,    step: 0.05, def: 0.8  },
      { label: 'use limits', key: 'useLimits',  min: 0,   max: 1,    step: 1,    def: 0    },
    ],
    fn: (v) => demoSlider(v.stiffness ?? 0.8, v.useLimits >= 0.5),
  },
  {
    name: 'Spring',
    knobs: [
      { label: 'restLength', key: 'restLength', min: 0.2, max: 3, step: 0.1, def: 1.0 },
      { label: 'stiffness',  key: 'stiffness',  min: 1,   max: 30, step: 1,  def: 8   },
    ],
    fn: (v) => demoSpring(v.restLength ?? 1.0, v.stiffness ?? 8),
  },
]

const panelEl = document.getElementById('panel')
const tabsEl  = document.getElementById('tabs')
let activeKnobs = {}

function activatePreset(i) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i))
  const preset = presets[i]
  activeKnobs = {}
  preset.knobs.forEach(k => { activeKnobs[k.key] = k.def })
  preset.fn(activeKnobs)

  panelEl.innerHTML = ''
  for (const k of preset.knobs) {
    const row = document.createElement('label')
    const val = document.createElement('span')
    const inp = document.createElement('input')
    inp.type='range'; inp.min=k.min; inp.max=k.max; inp.step=k.step; inp.value=k.def
    val.textContent = (+inp.value).toFixed(2)
    inp.addEventListener('input', () => {
      activeKnobs[k.key] = +inp.value
      val.textContent = (+inp.value).toFixed(2)
      preset.fn(activeKnobs)
    })
    row.innerHTML=`<span>${k.label}</span>`; row.appendChild(inp); row.appendChild(val)
    panelEl.appendChild(row)
  }
}

presets.forEach((p, i) => {
  const btn = document.createElement('div')
  btn.className = 'tab'
  btn.textContent = p.name
  btn.addEventListener('click', () => activatePreset(i))
  tabsEl.appendChild(btn)
})
activatePreset(0)

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.033)
  if (world) world.step(dt)
  syncMeshes()
  controls.update()
  renderer.render(scene, camera)
})

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
